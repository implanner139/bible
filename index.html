<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>讀經計畫 | iM行動教會</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --ink: #000;
      --ink2: #111;
      --gold: #f5c518;
      --gold-lt: #ffd740;
      --fs: 15px;
    }
    html { font-size: var(--fs); }
    body {
      background: var(--ink);
      color: #fff;
      font-family: -apple-system, 'PingFang TC', 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
      font-weight: 700;
      line-height: 2;
    }
    .card { background: #111; border-radius: 16px; border: 1px solid #2a2a2a; }
    .card-glass { background: rgba(255,255,255,0.04); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; }
    .gold-text { color: var(--gold); }
    .gold-border { border-color: var(--gold); }
    .verse-card { background: #1a1500; border: 1px solid #4a3c00; border-radius: 14px; }
    .scripture-text { font-weight: 400; line-height: 2.2; color: rgba(255,255,255,.9); }
    .scripture-verse-num { color: var(--gold); font-weight: 700; font-size: .75rem; margin-right: 4px; }
    .fade-in { animation: fadeUp .3s ease both; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .day-btn { border-radius: 8px; transition: all .15s; cursor: pointer; font-weight: 700; }
    .day-btn:active { transform: scale(.92); }
    .day-btn.locked { opacity: .25; cursor: not-allowed; }
    .day-btn.past { background: rgba(245,197,24,.1); border: 1px solid rgba(245,197,24,.25); }
    .day-btn.today { background: rgba(245,197,24,.2); border: 1px solid var(--gold); }
    .day-btn.selected { background: var(--gold); color: #000; border: 1px solid var(--gold-lt); }
    .day-btn.future { background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.08); }
    .tab-btn { padding: 10px 0; font-size: .75rem; font-weight: 700; border-bottom: 2px solid transparent; color: rgba(255,255,255,.3); transition: all .2s; white-space: nowrap; }
    .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
    .nav-btn { flex: 1; padding: 14px; border-radius: 12px; background: #1a1a1a; border: 1px solid #333; font-size: .875rem; font-weight: 700; color: #fff; transition: all .2s; }
    .nav-btn:disabled { opacity: .2; cursor: not-allowed; }
    .nav-btn:not(:disabled):active { background: #2a2a2a; }
    .today-btn { padding: 14px 16px; border-radius: 12px; background: rgba(245,197,24,.1); border: 1px solid rgba(245,197,24,.4); font-size: .875rem; font-weight: 700; color: var(--gold); transition: all .2s; white-space: nowrap; }
    .locked-overlay { background: #111; border-radius: 16px; }
    .section-label { font-size: .625rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: rgba(245,197,24,.5); margin-bottom: 8px; }
    .practice-god { background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.12); border-radius: 12px; padding: 14px; }
    .practice-people { background: rgba(245,197,24,.06); border: 1px solid rgba(245,197,24,.2); border-radius: 12px; padding: 14px; }
    .safe-bottom { padding-bottom: max(20px, env(safe-area-inset-bottom)); }
    /* Font size slider */
    #fs-slider { -webkit-appearance: none; appearance: none; width: 100%; height: 4px; background: #333; border-radius: 2px; outline: none; }
    #fs-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: var(--gold); cursor: pointer; }
    #fs-slider::-moz-range-thumb { width: 20px; height: 20px; border-radius: 50%; background: var(--gold); cursor: pointer; border: none; }
  </style>
</head>
<body class="min-h-screen">

<!-- Header -->
<header style="background:rgba(0,0,0,.97);backdrop-filter:blur(16px);border-bottom:1px solid #222" class="sticky top-0 z-20">
  <div class="max-w-lg mx-auto px-4 py-3 flex items-center justify-between">
    <div>
      <div class="text-xs font-semibold tracking-widest gold-text opacity-70 uppercase">iM行動教會</div>
      <h1 id="hdr-title" class="text-base font-bold text-white leading-tight">靈魂的室內設計師</h1>
    </div>
    <!-- Progress ring -->
    <div class="flex items-center gap-3">
      <div class="text-right">
        <div class="text-xl font-black text-white"><span id="hdr-done">0</span><span class="text-sm font-normal" style="color:rgba(232,232,240,.4)"> /38</span></div>
        <div class="text-[10px] gold-text opacity-70">以西結 · 保羅書信</div>
      </div>
      <div class="relative w-10 h-10">
        <svg class="w-10 h-10 -rotate-90" viewBox="0 0 36 36">
          <circle cx="18" cy="18" r="15.9" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="3"/>
          <circle id="progress-ring" cx="18" cy="18" r="15.9" fill="none" stroke="#c9a84c" stroke-width="3" stroke-dasharray="0 100" stroke-linecap="round"/>
        </svg>
      </div>
    </div>
  </div>
</header>

<main class="max-w-lg mx-auto px-4 pt-4 pb-6 space-y-4">

  <!-- Main card -->
  <div id="main-card" class="card overflow-hidden fade-in">

    <!-- Card top: book + day + passage -->
    <div id="card-top" class="px-5 pt-5 pb-4" style="background:linear-gradient(135deg,#0a0a0a,#1a1a1a)">
      <div class="flex items-start justify-between">
        <div class="flex-1 min-w-0 pr-3 space-y-2">
          <div class="flex items-center gap-2 flex-wrap">
            <span id="book-tag" class="text-xs font-bold px-3 py-1 rounded-full" style="background:rgba(201,168,76,.2);color:#e8c97a;border:1px solid rgba(201,168,76,.4)"></span>
            <span id="today-badge" class="hidden text-xs font-bold px-3 py-1 rounded-full" style="background:rgba(52,211,153,.15);color:#6ee7b7;border:1px solid rgba(52,211,153,.3)">今天</span>
            <span id="locked-badge" class="hidden text-xs font-bold px-3 py-1 rounded-full" style="background:rgba(255,255,255,.06);color:rgba(232,232,240,.4);border:1px solid rgba(255,255,255,.1)">🔒 尚未解鎖</span>
          </div>
          <p id="day-meta" class="text-xs" style="color:rgba(232,232,240,.45)"></p>
          <h2 id="passage" class="text-2xl font-black text-white leading-tight"></h2>
        </div>
        <div id="day-num" class="text-6xl font-black leading-none select-none flex-shrink-0" style="color:rgba(201,168,76,.15)"></div>
      </div>

      <!-- Focus -->
      <div class="mt-4 rounded-2xl px-4 py-3" style="background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2)">
        <div class="section-label">每日重點</div>
        <p id="focus" class="text-sm font-semibold leading-relaxed" style="color:#e8c97a"></p>
      </div>
    </div>

    <!-- Locked overlay -->
    <div id="locked-panel" class="hidden px-5 py-10 text-center">
      <div class="text-4xl mb-3">🔒</div>
      <p class="font-bold text-white text-lg mb-1">尚未解鎖</p>
      <p class="text-sm" style="color:rgba(232,232,240,.5)">這天的內容還未到達<br>請在當天回來閱讀</p>
    </div>

    <!-- Tabs -->
    <div id="tabs-row" class="flex px-4 gap-4 border-b" style="border-color:#222">
      <button id="tab-scripture" class="tab-btn active" onclick="switchTab('scripture')">今日經文</button>
      <button id="tab-content" class="tab-btn" onclick="switchTab('content')">真理導航 · 生活練習</button>
      <button id="tab-prayer" class="tab-btn" onclick="switchTab('prayer')">今日禱告 · 金句</button>
    </div>

    <!-- Panel: scripture -->
    <div id="panel-scripture" class="px-5 py-5">
      <div class="section-label">經文 · CUNP 中文新標點和合本</div>
      <div id="scripture-body" class="scripture-text text-sm"></div>
    </div>

    <!-- Panel: content -->
    <div id="panel-content" class="hidden px-5 py-5 space-y-4">
      <div>
        <div class="section-label">真理導航</div>
        <p id="navigation" class="text-sm" style="color:rgba(255,255,255,.85)"></p>
      </div>
      <div>
        <div class="section-label">生活練習</div>
        <div class="space-y-2">
          <div class="practice-god">
            <span class="text-xs font-black text-white">【愛神】</span>
            <p id="practice-god" class="text-sm mt-1" style="color:rgba(255,255,255,.85)"></p>
          </div>
          <div class="practice-people">
            <span class="text-xs font-black" style="color:var(--gold)">【愛人】</span>
            <p id="practice-people" class="text-sm mt-1" style="color:rgba(255,255,255,.85)"></p>
          </div>
        </div>
      </div>
    </div>

    <!-- Panel: prayer -->
    <div id="panel-prayer" class="hidden px-5 py-5 space-y-4">
      <div>
        <div class="section-label">今日禱告</div>
        <p id="prayer" class="text-sm italic" style="color:rgba(255,255,255,.8)"></p>
      </div>
      <div class="verse-card px-5 py-5">
        <div class="section-label" style="color:rgba(245,197,24,.7)">今日金句</div>
        <p id="verse" class="text-sm font-bold text-white"></p>
        <p id="tags" class="text-xs mt-3 gold-text opacity-60 font-medium"></p>
      </div>
    </div>
  </div>

  <!-- Font size slider -->
  <div class="card px-5 py-4">
    <div class="flex items-center gap-3">
      <span class="text-xs gold-text font-bold tracking-widest uppercase" style="opacity:.5;white-space:nowrap">字體大小</span>
      <span class="text-xs" style="color:rgba(255,255,255,.3)">A</span>
      <input id="fs-slider" type="range" min="12" max="22" value="15" step="1" class="flex-1">
      <span class="text-lg font-black" style="color:rgba(255,255,255,.3)">A</span>
      <span id="fs-label" class="text-xs gold-text font-bold" style="min-width:28px;text-align:right">15</span>
    </div>
  </div>

  <!-- Date picker -->
  <div>
    <div id="june-section">
      <div class="section-label px-1">靈魂的室內設計師 · 六月</div>
      <div id="june-grid" class="grid grid-cols-7 gap-1.5 mb-3"></div>
    </div>
    <div class="section-label px-1">31天與保羅一起解鎖生命新視角 · 七月</div>
    <div id="date-grid" class="grid grid-cols-7 gap-1.5"></div>
    <div class="flex items-center gap-5 mt-3 px-1">
      <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded-md" style="background:rgba(201,168,76,.2);border:1px solid rgba(201,168,76,.4)"></div><span class="text-xs" style="color:rgba(232,232,240,.4)">已完成</span></div>
      <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded-md" style="background:rgba(201,168,76,.25);border:1px solid #c9a84c"></div><span class="text-xs" style="color:rgba(232,232,240,.4)">今天</span></div>
      <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded-md" style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1)"></div><span class="text-xs" style="color:rgba(232,232,240,.4)">未來 🔒</span></div>
    </div>
  </div>

  <!-- Bottom navigation -->
  <div class="flex gap-2 safe-bottom">
    <button id="btn-prev" onclick="navigate(-1)" class="nav-btn">← 上一天</button>
    <button id="btn-today" onclick="goToday()" class="today-btn hidden">回今天</button>
    <button id="btn-next" onclick="navigate(1)" class="nav-btn">下一天 →</button>
  </div>

</main>

<script>
const JUNE_READINGS = [
  { date:"6/23", day:54, book:"以西結書", passage:"以西結書 42 章",
    focus:"分別為聖，生命中需要保留神聖的空間",
    navigation:"這章描述了聖殿周圍的聖屋與間隔。測量者的目的不只是建造，更是要將神聖的和世俗的分別開來。在室內設計師的眼中，空間的功能分區非常重要。同樣地，在靈魂更新的過程中，上帝要教導我們建立界線，保護我們生命中的神聖空間，不被世俗的紛擾侵蝕。這種分別為聖不是孤立，而是為了保持對上帝的專注與敬畏。當我們懂得分辨什麼是屬神的、什麼是世俗的時候，我們的生命就會展現出一種清透的力量。",
    practiceGod:"檢視你的生活，是否有一些世俗的雜事闖入了你與神相處的聖所？今天試著重新劃清界線。",
    practicePeople:"",
    prayer:"主啊，求祢教我建立分別為聖的界線。讓我保護與祢相處的空間，不讓雜事、噪音與世俗的急迫吞噬我對祢的專注。阿們。",
    verse:"「這牆是為了分別聖地與俗地。」（以西結書 42:20）", tags:"#界線 #分別為聖" },
  { date:"6/24", day:55, book:"以西結書", passage:"以西結書 43 章",
    focus:"榮耀重回中心，當主回到寶座，敬拜才恢復",
    navigation:"以西結目睹了曾在第十章離開的上帝榮耀，現在從東門重新進入聖殿。上帝宣告：這是我寶座之地。這對靈魂更新計畫來說是最高峰的時刻。當上帝重新回到我們生命的中心位子時，我們之前所測量的、所建造的這一切才有了解釋。沒有榮耀的殿只是精美的空屋，有榮耀同在的殿才是真正的家。當上帝的榮耀充滿時，我們不需要外在的喧囂，內心自然會生出敬畏與敬拜的火。這正是更新的終極目的。",
    practiceGod:"誠摯地邀請上帝：主啊，請祢重新坐回我生命寶座的中心。我願我的生命被祢的榮耀充滿。",
    practicePeople:"",
    prayer:"主啊，求祢重新坐回我生命寶座的中心。願我的生活不只是精美卻空洞的房子，而是被祢榮耀充滿、能敬拜祢的殿。阿們。",
    verse:"「耶和華的榮耀從東門照入殿中……耶和華的榮耀充滿了殿。」（以西結書 43:4-5）", tags:"#榮耀重回 #光芒" },
  { date:"6/25", day:56, book:"以西結書", passage:"以西結書 44 章",
    focus:"尊榮事奉，在聖潔的位份中學習忠心",
    navigation:"上帝對進入聖殿的人與供職的祭司提出了嚴格的要求。這不是為了限制，而是為了教導人如何尊榮上帝的聖潔。更新後的生命會有一種對神聖事物的敏感度。我們不再隨便對待服事，也不再隨便對待神的話語。祭司的細麻衣與飲食規定，都代表了一種生命質量的提升。當我們被上帝揀選成為事奉的人，我們就承擔了一份神聖的責任。上帝在乎我們的內外是否一致，祂要我們在每一個細小的服事中，都體現出對祂這位君王的敬重。",
    practiceGod:"檢視你對主日崇拜或平常服事的態度，是否因為熟悉而變得隨便？今天用最敬畏的心來預備服事。",
    practicePeople:"",
    prayer:"主啊，求祢恢復我對神聖事物的敬畏。不要讓熟悉使我隨便對待崇拜、服事或祢的話語，願我在小事上也忠心尊榮祢。阿們。",
    verse:"「他們要教導我的民分辨聖俗，從不潔淨和潔淨的中間指引他們。」（以西結書 44:23）", tags:"#敬虔 #祭司職份" },
  { date:"6/26", day:57, book:"以西結書", passage:"以西結書 45 章",
    focus:"公義的公平秤，將信仰落實在真實的公正中",
    navigation:"上帝要求領袖與百姓在交易中要使用公平的升斗。這章將聖殿的敬拜與社會的公義連結在一起。上帝厭惡虛假，祂在乎我們如何對待金錢與權力。一個經歷靈魂更新的人，他的誠實度會提高。這就是室內設計師在施工藍圖中要求的精確性。信仰若沒有落實在公道的天平上，那就是鳴的鑼、響的鈸。上帝呼召我們要活出的生命，是在職場、在家庭、在社會的各種交易中，都能讓人看見上帝那誠實無偽的屬性。",
    practiceGod:"檢查你的往來清單與隱藏成本，是否有任何損人利己或走捷徑的地方？求主恢復你心中那把公義的秤，讓你的生命經得起真理的精確量度。",
    practicePeople:"",
    prayer:"主啊，求祢恢復我心中公義的秤。讓我的信仰不只停在敬拜中，也落實在金錢、權力、工作與人際往來的誠實裡。阿們。",
    verse:"「你們要用公道天平、公道升斗、公道伊法。」（以西結書 45:10）", tags:"#公平天平 #誠實生活" },
  { date:"6/27", day:58, book:"以西結書", passage:"以西結書 46 章",
    focus:"節奏的禮讚，在規律的敬拜中享受安息",
    navigation:"這章詳述了在安息日與月朔進出聖殿的規矩。上帝為我們設立了敬拜的節奏。在室內設計中，光線與動線的律動感能賦予空間生命力；在靈命上也是如此。我們需要規律的敬拜來維持靈魂的健康。這不僅是宗教義務，更是一種生命律動。當我們按著上帝設定的節奏進出聖殿，我們就是在練習把主導權交還給神。這種節奏能保護我們不被世界的匆忙吞噬，讓我們的靈魂在上帝預定的安息中得到真正的修復與滋養。",
    practiceGod:"找出一個你最容易感到匆忙的時刻，強迫自己停下來靜默五分鐘，找回屬神的節奏。",
    practicePeople:"",
    prayer:"主啊，求祢把我從匆忙與失序中帶回祢的節奏。教我用規律的敬拜與安息，把主導權交還給祢，讓靈魂重新得修復。阿們。",
    verse:"「在安息日，在那門前敬拜耶和華。」（以西結書 46:3）", tags:"#安息節奏 #敬拜律動" },
  { date:"6/28", day:59, book:"以西結書", passage:"以西結書 47 章",
    focus:"生命的活水，聖靈的流動能醫治所有的荒涼",
    navigation:"以西結看見聖水從聖殿流出，從踝子骨到腰，最後成為不能過的河。這道活水流向何處，死海就變甜，魚類就繁多，河邊的樹木果子不斷。這就是靈魂更新最動人的畫面：上帝的恩典不是停留在聖殿內，而是要流向世界。當你內在的聖殿被潔淨、上帝的榮耀回歸後，你的生命也會湧流出醫治與滋養的力量。這活水能使苦味變甜，能使乾渴得滿足。更新的終極指標，就是看見聖靈的活水正透過你流向你身邊的人。",
    practiceGod:"想像你就是那道水流，今天你要流向誰？去滋潤、醫治哪一個正處於苦澀或荒涼中的靈魂？",
    practicePeople:"",
    prayer:"主啊，願祢的活水從我裡面湧流出去。求祢先醫治我的乾渴與苦澀，再差我成為滋潤別人的水流，流向需要安慰與更新的人。阿們。",
    verse:"「這水所流過的地方，百物都必生活。」（以西結書 47:9）", tags:"#生命活水 #醫治" },

const READINGS = [
  { date:"7/1",  day:1,  book:"羅馬書",  passage:"羅馬書 1:1-32",  focus:"福音是神的大能，能徹底翻轉你的人生底牌。", navigation:"保羅一開頭就將福音定義為一種顛覆性的力量。現代人常在各種評鑑、KPI中尋找自我認同，但福音告訴我們，人的根本困境不在於技巧不足，而是與生命的源頭斷了連結，導致生活秩序的崩潰。當我們試圖用受造物代替造物主時，內心就會陷入無底的焦慮。福音不是一套修身養性的道德規範，而是上帝主動介入歷史、更新人類命運的「最強外掛」，只要你願意相信，生命就能在最絕望處重新開機。", practiceGod:"在今天找一個安靜的5分鐘，向神承認自己常想靠自己掌控一切的驕傲，宣告祂才是你生命的主宰。", practicePeople:"留意身邊一位正處於高度焦慮或低潮的朋友，不說教，單純傳一則訊息表達關心並為他祝福。", prayer:"主啊，我承認常想用自己的好表現來證明自己，導致內心充滿焦慮。謝謝祢用福音的大能拯救我，今天我宣告祢是我生命的主，求祢的大能翻轉我的底牌，讓我靠著祢的愛活出新生的盼望。阿們。", verse:"「我不以福音為恥；這福音本是神的大能，要救一切相信的。」（羅馬書 1:16）", tags:"#大能 #破曉 #核心重啟" },
  { date:"7/2",  day:2,  book:"羅馬書",  passage:"羅馬書 2:1-29",  focus:"信仰不是外在的標籤，而是內心深處的誠實。", navigation:"保羅撕下了宗教人士的虛假面具。在社群媒體發達的今天，我們太擅長「打造精美的人設」，甚至在信仰上也會用流水線式的宗教行為來包裝自己，並以此評斷他人。然而，神看重的從來不是外在的儀式或完美的宗教履歷，而是那顆在無人看見時依然對祂誠實的「心割禮」。真正的信仰會讓我們放下定罪別人的放大鏡，拿起省察自己的鏡子，在神的聖潔光照中，看見自己對恩典的真實渴望。", practiceGod:"寫下一件你隱藏很久、不敢面對的軟弱，在禱告中赤露敞開地交給神，體驗祂不控訴的接納。", practicePeople:"今天刻意不對任何人的行為下主觀評論，當你想批評人時，轉為在心裡為對方的需要默默代禱。", prayer:"阿爸神，求祢赦免我常在人前包裝自己、在人後論斷他人的虛偽。求聖靈今天為我的心行割禮，讓我脫去偽裝，單單在祢面前赤露敞開，得著最真實的恩典與接納。阿們。", verse:"「因為外面作猶太人的，不是真猶太人……惟有裡面作的，才是真猶太人。」（羅馬書 2:28-29）", tags:"#鏡子 #真實 #心靈祭壇" },
  { date:"7/3",  day:3,  book:"羅馬書",  passage:"羅馬書 3:1-31",  focus:"在絕望的底線前，神的恩典為你無條件買單。", navigation:"這章經文揭示了人類最核心的財務危機：罪的破產。無論道德高尚還是放蕩不羈，在神的絕對公義面前，所有人都拿不出及格的生命成績單。但最美妙的轉折就在於「如今」——耶穌基督用祂的生命作為贖價，在十字架上為我們付清了所有債務。這就是「因信稱義」，它是免費的，卻是極其昂貴的代價換來的。現代人總覺得天下沒有白吃的午餐，但上帝偏偏要把這份宇宙間最珍貴的救恩，白白送給願意伸出信心之手接受的你。", practiceGod:"大聲宣告自己已經因信稱義，不再受控告，並用讚美感謝耶穌為你承擔了一切的罪責。", practicePeople:"在人際關係中實踐一次「免債」，主動原諒一位曾冒犯你、或在言語上對不起你的同事或家人。", prayer:"主耶穌，謝謝祢在十字架上為我那破產的生命全然買單。當我面對自責與控告時，求祢讓我有信心抓住「因信稱義」的白白恩典。也求祢賜我寬廣的心，今天能主動原諒冒犯我的人。阿們。", verse:"「如今卻蒙神的恩典，因基督耶穌的救贖，就白白地稱義。」（羅馬書 3:24）", tags:"#代價 #白白得來 #十字架" },
  { date:"7/4",  day:4,  book:"羅馬書",  passage:"羅馬書 4:1-25",  focus:"信心不是看自己的環境，而是看應許背後的那位神。", navigation:"保羅搬出了信心之父亞伯拉罕的故事。亞伯拉罕在百歲身體如同已死、撒拉生育斷絕的時候，依然選擇相信神的應許。這對活在凡事看數據、看KPI、看勝率的現代人是一個極大的挑戰。信心不是盲目的樂觀，也不是一種心理建設，而是把生命的錨定在神的品格上——祂是那位置於死地而能叫人復活、使無變為有的神。當你的銀行帳戶、健康或關係陷入「已死」的狀態時，信心是唯一的對接管道。", practiceGod:"找出一個你覺得目前最不可能改變的困境，向神宣告：即使環境看來絕望，我依然選擇相信祢的應許。", practicePeople:"尋找一位正因現實環境受挫而失去信心的肢體，用神的話語和正面的肯定去激勵他重新站起來。", prayer:"慈愛的神，祢是那使無變為有、叫死人復活的主。當我的環境看來一片荒涼死寂時，求祢挪去我的小信，讓我把靈魂的錨緊緊扣在祢不落空的應許上，用信心看見祢的作為。阿們。", verse:"「亞伯拉罕信神，這就算為他的義。」（羅馬書 4:3）", tags:"#星空應許 #無中生有 #錨" },
  { date:"7/5",  day:5,  book:"羅馬書",  passage:"羅馬書 5:1-21",  focus:"苦難是靈性肌肉的重訓，而恩典是永不乾涸的泉源。", navigation:"既然因信稱義，我們就與神和好了，但這並不意味著人生從此一帆風順。保羅大膽地指出，連苦難都可以成為我們歡喜的理由，因為苦難能鍛鍊出忍耐、老練與盼望。這就像是靈性的重訓，每一次的壓迫都在擴張我們生命承載恩典的容量。更重要的是，神的愛藉著聖靈已經澆灌在我們心裡。無論世界的風浪多大，基督在我們還作罪人時就為我們死，這份沉甸甸的愛，就是我們在風雨中絕不搖擺的鐵證。", practiceGod:"為你目前生命中正經歷的一個「微苦難」或挑戰向神獻上感謝，求聖靈將祂的愛再次澆灌下來。", practicePeople:"今天預備一份小點心或一杯咖啡，送給身邊正承擔極大工作或生活壓力的人，為他打氣。", prayer:"主啊，謝謝祢在風雨中作我最穩固的盾牌。求聖靈將祢源源不絕的愛再次澆灌在我的心裡，好讓目前的苦難挑戰成為我靈性重訓的養分，磨練出不絕望的盼望，並有餘力關懷受壓的人。阿們。", verse:"「惟有基督在我們還作罪人的時候為我們死，神的愛就在此向我們顯明了。」（羅馬書 5:8）", tags:"#重訓 #澆灌 #暴風雨中的錨" },
  { date:"7/6",  day:6,  book:"羅馬書",  passage:"羅馬書 6:1-23",  focus:"你的舊密碼已過期，今天起換上自由的新身分。", navigation:"很多人誤以為恩典可以當作放縱的通行證，但保羅強調，當我們受洗歸入基督時，那滿身惡習、被罪捆綁的「舊我」就已經宣告死亡並埋葬了。現在活著的，是一個與基督一同復活的「新我」。現代人常被過去的壞習慣、成癮或原生家庭的陰影緊緊扣留，但這章經文是你的靈性自由宣言。罪不再是你的老闆，你不需要再聽從它的指令。你可以主動把自己的眼、耳、口、手當作公義的器具獻給神，活出真正的主權獨立。", practiceGod:"做一個象徵性的動作（如握拳再放開），宣告某個捆綁你很久的壞習慣已與基督同死，今天你要為神而活。", practicePeople:"在與家人的互動中，刻意克制住平常容易脫口而出的情緒性壞脾氣，改用溫柔的言語回應。", prayer:"親愛的主，謝謝祢為我撕下了過去被罪控告的標籤。我宣告過去的惡習與創傷已與祢同埋葬。今天，我將我的身體與口舌獻上作公義的器具，求祢引導我用溫柔的言語，活出自由的新生命。阿們。", verse:"「因為知道我們的舊人和他同釘十字架，使罪身滅絕，叫我們不再作罪的奴僕。」（羅馬書 6:6）", tags:"#斷開捆綁 #新生 #自由" },
  { date:"7/7",  day:7,  book:"羅馬書",  passage:"羅馬書 7:1-25",  focus:"承認靠自己會搞砸，正是經歷基督拯救的起點。", navigation:"這一章保羅寫下了人類內心深處最真實的掙扎：「我所願意的善，我反不做；我所不願意的惡，我倒去做。」這種嚴重的內耗與無力感，每個現代人都感同身受——我們知道要自律、要溫柔、要正向，卻往往在現實中崩潰。保羅指出，單靠律法與意志力是無法勝過人性中的殘餘引力的。但這段看似絕望的呼喊，最終卻導向了驚天動地的讚美：「感謝神！靠著我們的主耶穌基督就能脫離了。」認輸，才是贏的開始。", practiceGod:"在禱告中對神承認：「主啊，這件事我靠自己真的辦不到，我需要祢。」將控制權完全交託。", practicePeople:"當看到別人的軟弱或搞砸事情時，收起批判，因為我們都在同樣的掙扎中，試著用體恤的心陪伴他。", prayer:"主啊，我真誠地面對自己內心的拉扯與內耗，承認單靠自己的意志力一定會搞砸。我願意放手，將生命的方向盤交託給祢，謝謝祢在我無力時作我的拯救，用祢的恩典帶我脫離掙扎。阿們。", verse:"「我真是苦啊！誰能救我脫離這取死的身體呢？感謝神，靠著我們的主耶穌基督就能脫離了。」（羅馬書 7:24-25）", tags:"#掙扎 #放手 #拯救的光" },
  { date:"7/8",  day:8,  book:"羅馬書",  passage:"羅馬書 8:1-39",  focus:"在聖靈的護航裡，沒有任何事物能切斷神對你的愛。", navigation:"羅馬書第八章是全書的高峰。保羅宣告那些在基督裡的，如今「就不定罪了」。現代人活在充滿定罪感與不安全感的環境中，隨時害怕被拋棄。但保羅為我們拉開了一個宇宙級的保護網：聖靈在我們心裡深切代求，並且我們已經得著了兒子的名分。即使受苦，這苦楚與將來的榮耀相比也微不足道。最後，那串歷史性的宣告——無論是死、是生、是現在的事、是將來的事，都不能叫我們與神的愛隔絕。這是最完美的終極安全感。", practiceGod:"用3分鐘默想神對你那份「不離不棄」的愛，並在心中對神說：「謝謝祢，在祢裡面我全然安全。」", practicePeople:"給一位正經歷極大挫折、覺得自己被神或被世界拋棄的肢體一個深沉的擁抱，或者為他親手寫一張鼓勵的卡片。", prayer:"阿爸天父，謝謝祢給了我合法的兒女名分，讓我在聖靈的代求中得著全然的安全感。我宣告，世上沒有任何艱難能將我與祢的愛隔絕，求祢用這份無敵的愛，安慰我身邊正在受挫的朋友。阿們。", verse:"「誰能使我們與基督的愛隔絕呢？難道是患難嗎？是困苦嗎？是逼迫嗎？……」（羅馬書 8:35）", tags:"#無敵的愛 #護航 #金光護罩" },
  { date:"7/9",  day:9,  book:"羅馬書",  passage:"羅馬書 9:1-33",  focus:"上帝擁有主權，祂的揀選絕不落空。", navigation:"第九章探討了深奧的「神聖主權與揀選」。現代文化崇尚個人主義與絕對掌控，我們總希望上帝按照我們的藍圖和劇本來演。但保羅提醒我們，窯匠難道沒有權柄用泥塊做出不同的器皿嗎？上帝的恩典與憐憫不受人的意志所左右，祂的計劃有更高的維度。這不是要讓我們感到宿命，而是要讓我們在驚嘆中放下妄想掌控明天的重擔，安息在祂完全公義且慈愛的至高主權中。", practiceGod:"學習在一個你一直想要神「照你意思行」的事情上放手，禱告宣告：「主啊，祢是窯匠，我是泥土，願祢的旨意成就。」", practicePeople:"在小組或群體中，刻意去接納並讚美一位「與你風格完全不同」的同工，欣賞神在每個人身上獨特的塑造。", prayer:"至高的主，祢是神聖的窯匠，我是被祢細心揉捏的泥土。我承認我常妄想掌控自己的明天，今天我選擇放手，臣服於祢美善的主權之下。求祢挪去我的抗拒，讓我安息在祢絕不落空的計劃裡。阿們。", verse:"「據此看來，這不在乎那願意的，也不在乎那奔跑的，只在乎發憐憫的神。」（羅馬書 9:16）", tags:"#窯匠的手 #主權 #星際軌道" },
  { date:"7/10", day:10, book:"羅馬書",  passage:"羅馬書 10:1-21", focus:"相信並宣告，把生命最好的消息分享出去。", navigation:"保羅在這裡強調了拯救的簡單與迫切——「心裡相信，口裡承認」。現代人常常把事情複雜化，以為要修行到某個程度才能得救，但神的道其實離我們不遠，就在我們口裡，在我們心裡。然而，保羅也提出了一個關鍵的行動問題：如果沒有人傳，人怎麼能聽見呢？在這個充斥著壞消息、八卦與對立的網路時代，我們被呼召成為那個帶領人遇見平安、傳遞福音好消息的「美善雙腳」。", practiceGod:"在早晨醒來時，大聲口裡承認耶穌是你今天各樣決定（職場、家庭）的主，讓話語宣告帶來屬靈權柄。", practicePeople:"預備一個簡單的信仰見證（大約2分鐘），並在心裡設定一個目標，在接下來這週找機會與一位未信的朋友分享。", prayer:"主耶穌，謝謝祢讓拯救的恩典如此靠近。今天我口裡承認、心裡相信祢是我生命中每個決定的主。求祢賜我佳美的腳蹤，挪去我的害羞與懼怕，讓我的生命成為向身邊人傳遞真平安的好消息擴音器。阿們。", verse:"「報福音、傳喜信的人，他們的腳蹤何等佳美！」（羅馬書 10:15）", tags:"#佳美腳蹤 #傳遞好消息 #心靈擴音器" },
  { date:"7/11", day:11, book:"羅馬書",  passage:"羅馬書 11:1-36", focus:"神的智慧深不可測，萬物最終都歸於祂。", navigation:"本章展示了救贖歷史的宏大拼圖。保羅解釋了為什麼以色列人看似跌倒，卻成了外邦人得救的契機，而最終神仍要憐憫眾人。這讓我們看見，上帝能把歷史的殘局、甚至人類的失敗，編織進祂完美的拯救計劃中。現代人在看新聞或面對混亂的世界局勢時常感到絕望，但當我們拉高視野，就會像保羅一樣發出由衷的讚嘆：神的智慧何其高深！萬有都是本於祂、倚靠祂、歸於祂。", practiceGod:"讀完經文後，不求索取，單純用保羅在最後的頌讚（33-36節）作為你對神深不可測之智慧的敬拜。", practicePeople:"面對教會或職場中看似完全「不可救藥」或與神對立的人，不要放棄，持續用信心在禱告中為他的翻轉守望。", prayer:"萬有的主宰，祢的智慧何其高深，祢的判斷深不可測！當我看著混亂的世界或殘破的局勢感到絕望時，求祢拉高我的屬靈視野，看見萬有最終都歸於祢。我要用讚美來代替擔憂，全心倚靠祢。阿們。", verse:"「深哉，神豐富的智慧和知識！他的判斷何其難測！他的蹤跡何其難尋！」（羅馬書 11:33）", tags:"#深不可測 #宇宙拼圖 #全景視野" },
  { date:"7/12", day:12, book:"羅馬書",  passage:"羅馬書 12:1-21", focus:"獻上生活作為最酷的祭物，用良善顛覆世界。", navigation:"羅馬書從這一章開始轉入精彩的生活實踐。保羅呼籲我們將「身體獻上當作活祭」。現代文化不斷給我們洗腦，要我們符合這個世界的模子（隨波逐流），但真正的敬拜不是主日唱幾首歌，而是在週一到週六的職場與生活中，心意更新而變化。這章也給出了極度具體的社群守則：愛人不可虛假、與喜樂的人同樂、與哀哭的人同哭，甚至不自己伸冤，而是用炭火般的良善去感化仇敵。", practiceGod:"在出門前禱告，將自己的雙眼、雙手和舌頭奉獻給神，作為今天在職場/學校中服事祂的聖潔祭物。", practicePeople:"刻意尋找一個你平常不太對盤或曾得罪你的人，在今天找機會讚美他的一項優點，或者主動協助他的工作。", prayer:"親愛的主，我不願再被這個世界的世俗模子給強行塑造。今天我將我的全人、我的職場生活獻上作為活祭。求聖靈更新我的思維，讓我能敏銳他人的哀哭與喜樂，以源源不絕的良善戰勝一切惡念。阿們。", verse:"「不要效法這個世界，只要心意更新而變化，叫你們察驗何為神的善良、純全、可喜悅的旨意。」（羅馬書 12:2）", tags:"#活祭 #心意更新 #逆流而上" },
  { date:"7/13", day:13, book:"羅馬書",  passage:"羅馬書 13:1-14", focus:"在黑暗的世代中，披戴耶穌活出清晨的光彩。", navigation:"本章探討了基督徒與社會權柄的關係，以及日常道德。保羅提醒我們，在地上要作遵紀守法、按時納稅的好公民，因為一切權柄出於神。但更扎心的是他對時間的敏感度：黑夜已深，白晝將近！現代社會充滿了暗昧的行為（放縱、嫉妒、紛爭），許多人過著黑白顛倒、靈性昏睡的生活。保羅呼籲我們該是「睡醒的時候了」，要脫去暗昧的行為，直接把耶穌基督當作外衣「披戴」在身上，讓你的日常行為經得起陽光的檢視。", practiceGod:"檢查自己一整天的時間分配，求聖靈光照是否有任何沉迷於社群或虛浮娛樂的「靈性昏睡」狀態，並做出調整。", practicePeople:"實踐「凡事都不可虧欠人，惟有彼此相愛要常以為虧欠」，今天主動結清一筆拖延的款項或人情債。", prayer:"主耶穌，黑夜已深，求祢喚醒我昏睡的靈魂。今天我要脫去暗昧懶散的行為，將祢當作光明的衣袍重新披戴在身上。讓我的行事為人誠實端正，在相愛中絕不虧欠任何人，活出清晨般的生命光彩。阿們。", verse:"「黑夜已深，白晝將近；我們就當脫去暗昧的行為，帶上光明的兵器。」（羅馬書 13:12）", tags:"#黎明防線 #披戴基督 #晨光" },
  { date:"7/14", day:14, book:"羅馬書",  passage:"羅馬書 14:1-23", focus:"接納不同的特質，不要讓你的自由成為別人的絆腳石。", navigation:"保羅處理了教會內部因為吃肉、守日等相對教義引發的內耗。在現代教會或小組中，我們也常因為政治立場、教養觀念或敬拜風格的不同而彼此論斷。保羅提出了一個偉大的神國原則：神的國不在於吃喝，而在於聖靈裡的公義、和平與喜樂。你有強壯的信心和自由很好，但更偉大的成熟是願意為了「不絆倒軟弱的肢體」而主動限制自己的自由。我們不是為了對錯而活，而是為了建造彼此。", practiceGod:"在內心深處向神交託：不再作別人的審判官，因為每個人最終都是向神獨自交帳，還給神絕對的審判權。", practicePeople:"今天在聚會或聊天中，刻意避開容易引發爭論的敏感話題，專注於彼此生命的建造與鼓勵。", prayer:"神國的主，求祢赦免我常想當別人的審判官。提醒我神的國不在於外在教條的對錯，而是在於聖靈中的公義與和平。賜我包容的胸懷，甘願為了不絆倒弟兄姊妹而限制自己的自由，專注建造群體。阿們。", verse:"「因為神的國不在乎吃喝，只在乎公義、和平，並聖靈中的喜樂。」（羅馬書 14:17）", tags:"#神國拼圖 #和平之子 #包容的胸懷" },
  { date:"7/15", day:15, book:"羅馬書",  passage:"羅馬書 15:1-33", focus:"擔當別人的軟弱，同心合意唱出信仰的交響樂。", navigation:"保羅在這章提出了效法基督的極致榜樣：不求自己的喜悅。堅固的人應當擔當不堅固人的軟弱。這與現代社會強調「利己主義」、「我自己好就好」的風氣完全背道而馳。教會就像是一個交響樂團，如果人人都只吹奏自己的主旋律，只會帶來刺耳的噪音；但當我們彼此接納、互相補位時，就能同心合意地用一個聲音榮耀上帝。", practiceGod:"禱告求神賜下「忍耐與安慰」，使你在面對教會中比較難相處的肢體時，有從神而來的力量堅持下去。", practicePeople:"主動去關心、協助小組或教會中一位公認較為軟弱、需要被照顧的肢體，用實際行動承擔他的重擔。", prayer:"賜忍耐與安慰的神，求祢賜給我們同心合意的心。效法耶穌不求自己喜悅的榜樣，讓我有力量主動擔當軟弱肢體的重擔。願我們在群體中放下個人的尖銳，用彼此接納的和聲，交織出榮耀祢的生命交響樂。阿們。", verse:"「但願賜忍耐安慰的神叫你們彼此同心，效法基督耶穌，一心一口榮耀神。」（羅馬書 15:5-6）", tags:"#交響樂 #彼此接納 #同心合意" },
  { date:"7/16", day:16, book:"羅馬書",  passage:"羅馬書 16:1-27", focus:"在同工的感謝名單中，看見默默奉獻的偉大。", navigation:"羅馬書的結尾看似是一串枯燥的問安名單，但只要仔細閱讀，就會發現這是一幅充滿溫度的「天國英雄榜」。保羅提到了女執事非比、同甘共苦的百基拉和亞居拉，以及許多默默無聞卻在主裡勞苦的人。現代人習慣追逐鎂光燈與C位，但神的國度是由無數個在台下默默奉獻、接待、代禱的普通人撐起來的。每個人在神眼中都有名字，都是不可或缺的策略夥伴。", practiceGod:"為了你在信仰路上曾遇過的屬靈長輩、同工向神獻上感謝，謝謝神透過這群人編織了你的生命。", practicePeople:"在今天寫一封感謝的訊息，傳給教會中一位默默服事（如音控、招待、清潔或行政）的同工，表達你的看見與謝意。", prayer:"全智的神，謝謝祢在天國名冊上記下每個默默奉獻的名字。我為著身邊那些甘心站在台下、低調服事的同工向祢獻上由衷的感謝。求祢親自堅固他們的腳步，也讓我成為一個懂得感恩、樂意補位的夥伴。阿們。", verse:"「願榮耀，因耶穌基督，歸與獨一全智的神，直到永遠。阿們！」（羅馬書 16:27）", tags:"#無名英雄 #天國名冊 #永恆榮耀" },
  { date:"7/17", day:17, book:"加拉太書", passage:"加拉太書 1:1-24", focus:"堅守純正的福音，拒絕討好世界的山寨信仰。", navigation:"歡迎來到加拉太書！這是一卷保羅帶著神聖憤怒寫下的書信，因為加拉太教會正被「山寨版福音」給污染，試圖在恩典之外加上律法的包袱。保羅非常嚴厲地宣告：如果有人傳別的福音，他就該受咒詛！現代人的山寨福音可能是「成功神學」或「道德主義」——以為只要表現好，神才會愛我。保羅用自己的生命見證（從逼迫者變成使徒）直言：我不是要討人的喜歡，我是要作基督的僕人。純淨的福音，才有純淨的能力。", practiceGod:"審視自己的禱告動機，是否有時把神當作滿足慾望的工具？求神恢復你對祂純粹的敬畏與愛。", practicePeople:"當身邊的肢體因表現不佳而深感內疚時，不要用道德標準去加重他的負擔，要用純粹的恩典話語安慰他。", prayer:"主基督，求祢保守我的心不被世界塞滿山寨的律法與包裝。我不要過度迎合人的眼光，我渴望單單作祢真誠的僕人。求祢恢復我對純淨恩典的渴慕，讓我用這無條件的愛，安慰因表現不完美而內疚的肢體。阿們。", verse:"「我現在是要得人的心呢？還是要得神的心呢？我豈是討人的喜歡嗎？」（加拉太書 1:10）", tags:"#拒絕山寨 #基督僕人 #純粹" },
  { date:"7/18", day:18, book:"加拉太書", passage:"加拉太書 2:1-21", focus:"與基督同釘十字架，讓祂在你的生命中接管駕駛座。", navigation:"保羅在這章記錄了他與大徒弟彼得的正面衝突，因為彼得在猶太人面前裝假。這提醒我們，連屬靈巨擘都可能落入「假冒偽善」的陷阱。隨後保羅說出了全聖經最震撼的宣告之一：加拉太書 2:20。我們已經與基督同釘十字架，現在活著的不再是我，乃是基督在我裡面活著。現代人活得很累，是因為我們一直想坐在自己生命的駕駛座上掌控一切。把方向盤交給基督，靠著愛我們的神子的信心而活，這才是真正的輕鬆與釋放。", practiceGod:"閉上眼睛，想像自己把生命的方向盤交給坐在身旁的耶穌，對祂說：「主啊，今天祢來開車，我聽祢的。」", practicePeople:"當今天在職場或人際關係中感到「自我（ego）」受挫、想發脾氣時，心中默念：「現在活著的不再是我，乃是基督。」讓情緒冷卻。", prayer:"主耶穌，今天我向我的驕傲與掌控欲宣告同釘十字架。我正式將生命的方向盤交託給祢，請祢接管我的心思意念。當我的自我受挫、憤怒將起時，求祢讓我在祢裡面安息，宣告現在活著的乃是基督。阿們。", verse:"「現在活著的不再是我，乃是基督在我裡面活著。」（加拉太書 2:20）", tags:"#方向盤交出 #同釘十字架 #新生命" },
  { date:"7/19", day:19, book:"加拉太書", passage:"加拉太書 3:1-29", focus:"不要當靈性的無知人，靠聖靈入門就絕不靠肉體成全。", navigation:"保羅大聲疾呼：「無知的加拉太人哪！」這句話同樣在對現代基督徒敲警鐘。我們常常「靠聖靈入門」，體驗到神的愛而流淚得救，但過了幾年，我們卻開始「靠肉體成全」——企圖用自己的表現、事工的成就、讀經的時數來向神邀功、向人炫耀。保羅說，律法只是把我們引向基督的「訓蒙師」。現在我們因著信，都已經披戴基督，在祂裡面不分階級、身分，全部都是神合法的產業繼承人。", practiceGod:"放下今天所有事工的成就感，單純回到像小孩子一樣的單純，對神說：「阿爸父，謝謝祢，我是祢的寶貝孩子。」", practicePeople:"在教會群體中，刻意打破因社會地位、財富或學歷帶來的無形隔閡，主動去跟不同背景的人同桌團契。", prayer:"親愛的阿爸天父，謝謝祢讓我藉著信心白白披戴基督，成為合法的產業繼承人。求祢拿走我想靠著事工成就或道德好表現來向祢邀功的無知。讓我今天回到最單純的孩子身分，跨越階級去愛不同的人。阿們。", verse:"「你們既靠聖靈入門，如今還靠肉體成全嗎？你們是這樣無知嗎？」（加拉太書 3:3）", tags:"#聖靈入門 #拒絕內卷 #天國繼承人" },
  { date:"7/20", day:20, book:"加拉太書", passage:"加拉太書 4:1-31", focus:"脫離奴僕的恐懼，大聲呼叫神為「阿爸，父！」", navigation:"許多現代基督徒與上帝的關係像「雇工」——做多少事、拿多少薪水，沒做好就害怕被開除。保羅在這章宣告，時候滿足了，神差遣祂的兒子來，是要叫我們得著「兒子的名分」。神甚至把兒子的靈放入我們心裡，使我們能親暱地喊祂「阿爸，父！」雇工做事是出於恐懼，兒子做事是出於愛。保羅甚至用生動的比喻，寧願承受生產之苦，也要看到基督的生命在加拉太人心裡成形，這就是福音的終極渴望。", practiceGod:"在今天每一次禱告的開頭，刻意放慢速度，深情地呼喊三聲「阿爸，父」，體會那份毫無恐懼的父子/父女連結。", practicePeople:"身為父母或屬靈同伴的你，今天用無條件的愛去包容孩子或羊群的犯錯，不急著責備，先給予接納的擁抱。", prayer:"阿爸，父！謝謝祢差遣兒子的靈進入我的心，徹底粉碎了我靈魂裡那份害怕被開除的奴僕恐懼。我是祢心愛的兒女，求祢讓基督的生命在我裡面成熟成形，使我能用這份毫無條件的愛，去擁抱犯錯的人。阿們。", verse:"「你們既為兒子，神就差他兒子的靈進入你們的心，呼叫：『阿爸！父！』」（加拉太書 4:6）", tags:"#阿爸父 #不再是奴僕 #生命成形" },
  { date:"7/21", day:21, book:"加拉太書", passage:"加拉太書 5:1-26", focus:"順著聖靈行事，在自由中結出豐盛的生命果子。", navigation:"基督釋放了我們，是要我們得自由！但現代人常把自由誤解為「只要我喜歡，有什麼不可以」的放縱。保羅指出，放縱情慾只會帶來嫉妒、惱怒、紛爭等靈性惡臭。真正的自由，是擁有「不做惡事的自由」，並且甘心樂意用愛心彼此服事。這章提出了著名的「聖靈九果」：仁愛、喜樂、和平、忍耐、恩慈、良善、信實、溫柔、節制。這些果子不是靠意志力裝飾上去的，而是當我們每天順著聖靈的引導生活時，生命自然散發出的迷人香氣。", practiceGod:"檢視聖靈九果，選出一個你目前最缺乏的（例如：節制或忍耐），求聖靈今天在你的心中特別動工培育。", practicePeople:"實踐「用愛心彼此服事」，今天為家人或同事做一件微小但貼心的服事（例如：順手倒垃圾、洗碗或幫忙買午餐）。", prayer:"釋放我的主，謝謝祢賜我真自由。求聖靈今天在我的生命泥土中，栽培出仁愛、忍耐與節制的果子。主啊，挪去我的自私與血氣，讓我心甘情願透過微小貼心的實踐，在生活中用愛心彼此服事。阿們。", verse:"「聖靈所結的果子，就是仁愛、喜樂、和平、忍耐、恩慈、良善、信實、溫柔、節制。」（加拉太書 5:22-23）", tags:"#聖靈果子 #真自由 #香氣溢出" },
  { date:"7/22", day:22, book:"加拉太書", passage:"加拉太書 6:1-18", focus:"行善不灰心，因為順著聖靈撒種的必收成永生。", navigation:"加拉太書的尾聲充滿了極具操作性的群體智慧。保羅提醒我們，若看見肢體被過犯所勝，要用「溫柔的心」把他挽回過來，並且要互相擔當重擔。更重要的是，保羅提出了一個宇宙恆常的律：人種的是什麼，收的也是什麼。在現代這個講求速成的時代，行善和服事往往短時間看不到效果，讓人容易疲憊灰心。請記住這句應許：若不灰心，到了時候就要收成！不要為自己的面子驕傲，要單單誇耀耶穌基督的十字架。", practiceGod:"面對服事或信仰生活中的瓶頸，向神做一個「不灰心」的宣告，求祂為你的靈性續航力加添神聖的燃料。", practicePeople:"當得知某位肢體正處於經濟、身體或情緒的極大重擔中，主動聯絡他，對他說：「這段路，我陪你一起扛。」並給予具體協助。", prayer:"恆久忍耐的主，在漫長的撒種過程中，我的肉體常常感到疲憊灰心。求祢將十字架的榮耀刻在我心中，作我永不枯竭的燃料。讓我行善不喪志，並賜我溫柔的心與實際行動，去與軟弱肢體同扛重擔。阿們。", verse:"「我們行善，不可喪志；若不灰心，到了時候就要收成。」（加拉太書 6:9）", tags:"#不灰心撒種 #挽回與擔當 #十字架的榮耀" },
  { date:"7/23", day:23, book:"歌羅西書", passage:"歌羅西書 1:1-29", focus:"基督是一切的核心，祂在凡事上居首位。", navigation:"歡迎進入歌羅西書！這是一卷將耶穌基督的榮耀放大到極致的書信。當時歌羅西教會受到了神祕主義和異端的干擾，保羅直接拋出了「基督最高論」：耶穌是那不能看見之神的像，萬有都是靠祂造的，也是為祂造的。現代世界有太多事物在爭奪我們心中的焦點（金錢、名聲、甚至事工）。保羅提醒我們，基督才是那維繫宇宙運作、也是住存在我們心裡那「榮耀的盼望」。當基督在你的凡事上居首位時，你生命零散的拼圖才能找到正確的位置。", practiceGod:"在禱告中尊崇耶穌是你生命中每一部分的「萬王之王」（包括你的財務、婚姻、未來），宣告祂居首位。", practicePeople:"面對你目前正在牧養或關懷的對象，效法保羅的志向：用諸般的智慧勸戒、教導他，要把他「在基督裡完完全全地引到神面前」。", prayer:"榮耀的元首基督，祢是那不能看見之神的像。今天我將我的金錢、未來與家庭完全尊祢為大，宣告祢在我的凡事上高居首位。願祢這至高的榮耀盼望，成為我牧養、引導他人的唯一核心。阿們。", verse:"「他在萬有之先；萬有也靠他而立。他也是教會全體之首……使他可以在凡事上居首位。」（歌羅西書 1:17-18）", tags:"#居首位 #宇宙中心 #榮耀盼望" },
  { date:"7/24", day:24, book:"歌羅西書", passage:"歌羅西書 2:1-23", focus:"在基督裡生根建造，拒絕世俗虛空的哲學洗腦。", navigation:"保羅擔心歌羅西人被世俗的虛空妄言和人間遺傳給「擄去」。現代社會是一個巨大的洗腦機器，透過短影音、廣告和主流價值觀，不斷灌輸我們「你不夠好、你需要擁有更多才能幸福」的虛假哲學。但保羅大聲宣告：神本性的一切豐盛，都有形有體地居住在基督裡面，而我們在祂裡面也已經「得了豐盛」。你不需要靠精緻的律法主義或神秘體驗來給自己加分，你只需要在基督裡紮根，祂已經在十字架上公開贏得了勝仗，把所有的控告塗抹掉了。", practiceGod:"刻意安排一段30分鐘遠離手機的時間，單純藉著讀經與默想，讓自己的靈性生命在基督的肥沃土壤中深根。", practicePeople:"面對身邊正被世俗「比較文化」壓得喘不過氣的朋友，用神的話語提醒他：他在基督裡已經得著了最完美的豐盛。", prayer:"主基督，這世界每天都在對我進行虛空的哲學洗腦，試圖用比較奪走我的平安。我宣告我在祢裡面已經得著了一切的豐盛。求祢讓我的靈修生活在祢裡面生根建造，能用十架凱旋的真理，釋放被壓的人。阿們。", verse:"「你們既然接受了主基督耶穌，就當遵他而行，在他裡面生根建造，信心堅固……」（歌羅西書 2:6-7）", tags:"#生根建造 #看穿虛空 #十架凱旋" },
  { date:"7/25", day:25, book:"歌羅西書", passage:"歌羅西書 3:1-25", focus:"脫去舊人的髒衣服，換上天國最新款的恩慈套裝。", navigation:"既然我們與基督一同復活，思維邏輯就必須升級，要「思念上面的事」。保羅用了一個極具畫面感的比喻：脫衣服與穿衣服。我們要像脫掉發臭的舊衣服一樣，脫去惱恨、憤怒、惡毒和謊言；同時，要穿上天國最新款的衣服——憐憫、恩慈、謙虛、溫柔和忍耐。最重要的是，要讓「基督的平安在心裡裁判（作主）」。這章還延伸到了家庭與職場：無論做什麼，都要像給主做的，而不是給人做的。", practiceGod:"在今天做任何決定或陷入情緒拉扯時，安靜下來問自己：「此時此刻，基督的平安在我的心裡投贊成票還是反對票？」", practicePeople:"面對家人或極難伺候的老闆/客戶，在心中默默對自己說：「今天我是為耶穌做的。」用最高標準的溫柔與敬業回應他。", prayer:"與我一同復活的主，今天我要脫去憤怒與惡毒的髒衣。求祢為我披上憐憫與溫柔的天國衣服。讓基督的平安作我心中的裁判長，在職場、家庭中，使我所說所做都奉祢的名，甘心樂意為祢而行。阿們。", verse:"「無論做什麼，或說話或行事，都要奉主耶穌的名，藉著他感謝父神。」（歌羅西書 3:17）", tags:"#天國服飾 #基督的平安 #為耶穌而做" },
  { date:"7/26", day:26, book:"歌羅西書", passage:"歌羅西書 4:1-18", focus:"言語要帶著和氣與鹽味，在日常中抓住展現信仰的窗口。", navigation:"歌羅西書的尾聲聚焦在門徒的公關與人際智慧。保羅呼籲我們要恆切禱告，並且在與未信主的人交往時要「用智慧」。他提到一個非常生動的指標：你們的言語要常常帶著和氣，好像「用鹽調和」。鹽能防腐、能提味。現代網絡世界充滿了辛辣、諷刺與攻擊性的語言，基督徒的對話應該要成為社會的防腐劑，讓人感到溫暖且有深度。", practiceGod:"為教會的牧者、宣教士或全職同工恆切禱告，求神為他們開傳道的門，賜給他們無懼的膽量。", practicePeople:"今天在社群媒體留言或與人對話時，刻意過濾掉任何負面消極的詞彙，讓你的話語充滿鼓勵、和氣與智慧的「鹽味」。", prayer:"智慧的主，求祢用聖靈防腐的鹽，調和我的舌頭。當我面對網絡或日常對話時，除去我的血氣與諷刺，讓我的言語充滿帶著和氣的鹽味。也求祢為福音開傳道的門，加添牧者與同工無懼的膽量。阿們。", verse:"「你們的言語要常常帶著和氣，好像用鹽調和，就可知道該怎樣回答各人。」（歌羅西書 4:6）", tags:"#鹽味言語 #恆切禱告 #智慧公關" },
  { date:"7/27", day:27, book:"腓立比書", passage:"腓立比書 1:1-30", focus:"無論環境如何受限，活著就是基督，死了就有益處。", navigation:"歡迎來到充滿喜樂的腓立比書！這卷書最奇妙的地方在於，它是保羅在伸手不見五指的監獄裡寫成的，但「喜樂」這個詞卻貫穿全書。保羅向我們展示了什麼叫做「環境無法囚禁的生命」。他坐在監獄裡，卻看見福音因此被興旺；他面對生死的抉擇，卻活出驚人的高度：「因我活著就是基督，我死了就有益處。」現代人常因為工作受挫、財務吃緊就失去喜樂，但保羅向我們證明，當你活著的目的完全是為了基督時，沒有任何環境能剝奪你的核心喜樂。", practiceGod:"面對目前把你關住的「環境監獄」（如不順遂的現狀），宣告這環境反而要叫福音興旺，並為此讚美神。", practicePeople:"效法保羅對腓立比教會的愛，在心裡默默為你小組的每位組員提名禱告，並由衷地為他們在信仰上的長進感到歡欣。", prayer:"監獄中賜喜樂的主，不論我的現狀如何受限，我宣告環境無法囚禁我的靈魂！我活著的終極目的就是基督。求祢挪去我因資源匱乏帶來的沮喪，讓我在困境中高歌，持續用信心守望並長進我所愛的肢體。阿們。", verse:"「因我活著就是基督，我死了就有益處。」（腓立比書 1:21）", tags:"#監獄中的歌聲 #活著就是基督 #超越環境的喜樂" },
  { date:"7/28", day:28, book:"腓立比書", passage:"腓立比書 2:1-30", focus:"效法基督的虛己與下降，在世上作發光的星體。", navigation:"這章包含了著名的新約聖經神學高峰——「基督頌」。保羅呼籲教會要同心，而秘訣就是「以基督耶穌的心為心」。耶穌展現了一種與世界完全相反的「下降美學」：祂本有神的形象，卻反倒虛己，取了奴僕的形象，甚至順服至死。現代文化教我們不斷向上爬、爭權奪利、證明自己多厲害；但天國的偉大卻在於誰願意走下去服事。當我們甘心放下權利、不發怨言、不說爭論的話時，我們就會像黑夜中的「明體（星星）」一樣，在扭曲的世代中發出耀眼的光芒。", practiceGod:"默想耶穌在十字架上的傾倒與虛己，在禱告中對神說：「主啊，我願意放下我的面子與特權，求祢賜我一顆僕人的心。」", practicePeople:"在今天的團隊合作或家庭生活中，當發生意見不合時，刻意實踐「各人看別人比自己強」，先聆聽並成就別人的想法。", prayer:"主耶穌，求祢將祢謙卑下降的十架美學深深烙印在我心裡。拿走我想在團隊或家庭中爭競出頭的傲慢，賜我一顆順服虛己的僕人之心。讓我甘心成全、看別人比自己強，在黑夜世代中如星星般為祢發光。阿們。", verse:"「你們當以基督耶穌的心為心……反倒虛己，取了奴僕的形象，成為人的樣式。」（腓立比書 2:5-7）", tags:"#下降美學 #以基督的心為心 #夜空中的星" },
  { date:"7/29", day:29, book:"腓立比書", passage:"腓立比書 3:1-21", focus:"丟棄過去的偶像與履歷，忘記背後努力向著標竿直跑。", navigation:"保羅在這章大膽地丟出了他的靈性斷捨離。他列舉了自己過去引以為傲的宗教履歷（純種猶太人、法利賽人、律法上的無可指責），但隨後他宣告：為了認識耶穌，他已經把這一切看作「糞土（垃圾）」。現代人身上貼滿了各種標籤：名校畢業、高薪職位、完美外表，我們常被這些標籤給綁架。保羅教導我們，最崇高的知識就是認識基督。不要沉溺於過去的成功，也不要被過去的失敗捆綁，拍拍灰塵，忘記背後，努力面前的，向著神在基督裡召你拿的天國獎賞直跑！", practiceGod:"拿出一張紙，寫下你目前最引以為傲的外在成就（或最讓你自卑的過去），在禱告中宣告：與認識基督相比，這一切都微不足道。", practicePeople:"關懷一位正沉溺於過去失敗陰影、或者正因中年危機失去方向的肢體，陪伴他一起尋找神在前方為他預備的生命標竿。", prayer:"主耶穌，與認識祢這至高至美的至寶相比，世上的名利標籤皆是糞土。求祢給我屬靈的勇氣進行靈性斷捨離，讓我徹底忘記背後的成就與失敗，拍拍灰塵，雙眼單單注視天國標竿，全力奔跑。阿們。", verse:"「我只有一件事，就是忘記背後，努力面前的，向著標竿直跑。」（腓立比書 3:13-14）", tags:"#靈性斷捨離 #向著標竿直跑 #天國公民" },
  { date:"7/30", day:30, book:"腓立比書", passage:"腓立比書 4:1-23", focus:"靠著加力量的基督，在任何環境中都能學會知足的秘訣。", navigation:"這是腓立比書充滿力量與安慰的終章。保羅留下了那句激勵無數人的終極應許：「我靠著那加給我力量的，凡事都能做。」但請注意，這句話的上下文不是世俗的成功學，而是關乎「靈性的知足」。現代社會充斥著比較與消費主義，不斷激發我們靈魂的飢餓感。保羅卻在監獄中親自示範，無論是處豐富還是處卑賤，他都得著了隨事隨在的秘訣。這是一種由內而外的強大，因為有一位神會照祂榮耀的豐富，在基督裡滿足你一切的需要。", practiceGod:"面對未來未知的生活挑戰，在神面前宣告：「主啊，靠著祢賜的力量，我宣告我能帶著喜樂與知足勝過一切。」", practicePeople:"實踐「彼此幫貼」，今天慷慨地給予身邊某位在經濟、或事工上需要資源的肢體一筆實際的奉獻或實質的援助。", prayer:"凡事都能的主，當消費主義與比較不斷激發我靈魂的飢餓時，求祢用祢榮耀的豐富填滿我。我宣告靠著祢賜的力量，在任何高山低谷中我都學會了知足，並樂意以慷慨的支援，成為他人豐富的祝福。阿們。", verse:"「我靠著那加給我力量的，凡事都能做。」（腓立比書 4:13）", tags:"#凡事都能 #靈性知足 #神聖燃料" },
  { date:"7/31", day:31, book:"腓利門書", passage:"腓利門書 1:1-25", focus:"福音突破階級屏障，在基督裡用愛修復破碎的關係。", navigation:"這卷短短的私人信件，展示了福音落地在人際關係中時最震撼的張力。保羅在獄中帶領了逃跑的奴隸阿尼西謀信主，隨後他寫信給奴隸主腓利門，懇求他不僅要饒恕阿尼西謀，更要「接納他如同親愛的弟兄」。在當時羅馬帝國階級森嚴、逃奴會被判死刑的背景下，這簡直是顛覆社會結構的要求。這讓我們看見，真正的基督教信仰不只是個人的修養，更是能在受損、背叛與破碎的社會關係中，帶來完全的和好與恢復。", practiceGod:"感謝神在我們還是得罪祂的「逃奴」時，就藉著耶穌接待我們。求神賜下天國的愛，來擴張自己饒恕他人的容量。", practicePeople:"思想在你目前的人際網絡中，是否有一個長久疏離、或曾傷害過你的「阿尼西謀」？主動在心中饒恕他，並在今天傳一則簡單平安的問候給對方，跨出和好的第一步。", prayer:"恩典和好的神，謝謝祢在我們還是罪惡逃奴時，就張開雙臂接納我們成為親愛的兒女。求祢除去我心中深藏的怨恨高牆，賜我突破階級與傷害的愛，主動去饒恕、修復那段受損的關係，讓生命重歸和好。阿們。", verse:"「他不再是奴僕，乃是高過奴僕，是親愛的兄弟。」（腓利門書 1:16）", tags:"#恩典和好 #不再是奴僕 #打破高牆" },
];

const SCRIPTURE = {
  '6/23': `42:1 他帶我出來向北，進到外院，帶我到那些對著空地、對著北邊樓房的聖屋那裡。
42:2 在樓房前面，那聖屋朝北，長一百肘，寬五十肘。
42:3 在內院的二十肘之內，並外院的石鋪地之間，在三層有廊子彼此相對。
42:4 在那些聖屋前面有走廊，寬十肘，深一百肘，開口向北。
42:5 上層的聖屋比下層和中層的窄，因為廊子從那裡占去了地位。
42:6 那三層都沒有柱子，不像院子有柱子，所以上層比下層、比中層更窄。
42:7 外面有牆與那些聖屋平行，長五十肘，是在外院聖屋的前面。
42:8 在外院那些聖屋的長度共有五十肘，在殿前的長度有一百肘。
42:9 在那些聖屋下面，從東面進去，是從外院進去的地方。
42:10 在院子東牆的南面，對著空地、對著建築物，那裡也有聖屋。
42:11 前面有走廊，和北邊聖屋的走廊一樣，深廣相同，規模相似。
42:12 南邊聖屋的出入口，在走廊前頭的東面有一道門。
42:13 他對我說：北面的聖屋、南面的聖屋，都在空地前面，是聖房，在那裡，近耶和華的祭司要吃至聖之物，要放至聖之物，就是素祭、贖罪祭、贖愆祭，因為那地方是聖的。
42:14 祭司進到聖所，出聖所的時候，不可進入外院，須要在聖屋放下他們供職的衣服，因為那衣服是聖的，要穿上別的衣服才可以進入為民安排的地方。
42:15 他量完了內殿，就帶我從朝東的門出來，照樣量了四圍。

42:18 他量南面，共五百肘。
42:19 他量西面，共五百肘。
42:20 他量四面，四圍有牆，長五百肘，寬五百肘，為要分別聖地與俗地。`,

  '6/24': `43:1 以後，他帶我到朝東的門那裡。
43:2 以色列神的榮耀從東而來，他的聲音如同多水的聲音，地就因他的榮耀發光。
43:3 這異象與他來滅城時我所見的異象一樣，與我在迦巴魯河邊所見的異象也一樣，我就俯伏在地。
43:4 耶和華的榮耀從朝東的門進入殿中。
43:5 靈將我舉起，帶我進入內院，耶和華的榮耀充滿了殿。
43:6 我聽見有人從殿中對我說話，見有一個人站在我旁邊。
43:7 他對我說：人子啊，這是我寶座之地，是我腳掌所踏之地，我要在這裡住在以色列人中直到永遠。以色列家和他們的君王，必不再以淫亂，並以他們君王的屍首在高處污穢我的聖名。
43:8 他們將門檻緊靠我的門檻，將門框緊靠我的門框，只有一牆之隔，他們行那些可憎的事，就污穢了我的聖名，所以我在怒中把他們滅絕。
43:9 現在他們要從我面前除掉他們的淫亂，和他們君王的屍首，我就住在他們中間直到永遠。
43:10 人子啊，你要將這殿指示以色列家，他們好因自己的罪孽慚愧，也要量其式樣。
43:11 他們若因所行的一切事慚愧，你就把這殿的形狀、規模、出入之處，並一切形狀、一切條例，都告訴他們，當他們面前寫出來，使他們謹守遵行。
43:12 殿的條例是這樣：殿頂四圍全是至聖的，這就是殿的條例。
43:13 壇的尺寸，用肘為度（每肘是一肘零一掌）：底座高一肘，邊寬一肘，四圍的沿高一拃，這是壇座的規模。
43:14 從地上底座到下壇台高兩肘，寬一肘；從小壇台到大壇台高四肘，寬一肘。
43:15 爐壇高四肘，爐壇上有角四個。
43:16 爐壇是四方的，長十二肘，寬十二肘。
43:17 壇台是四方的，長十四肘，寬十四肘，四圍的沿高半肘，底座四圍各寬一肘，壇的階梯朝東。
43:18 他對我說：人子啊，主耶和華如此說：建造祭壇獻燔祭、灑血的條例是這樣：
43:19 你要將一隻公牛犢給祭司利未人撒督的後裔——就是那些近前來事奉我的人——作贖罪祭，這是主耶和華說的。
43:20 你要取些公牛的血，抹在壇的四角上和壇台的四角並四圍的沿上，要這樣潔淨壇，為壇贖罪。
43:21 你要把那贖罪祭的公牛，燒在殿所指定的地方，在聖所以外。
43:22 第二天，你要把無殘疾的公山羊獻為贖罪祭，要像潔淨壇如用公牛一樣潔淨壇。
43:23 潔淨完了，要獻無殘疾的公牛犢和羊群中無殘疾的公綿羊。
43:24 要獻在耶和華面前，祭司要撒鹽在其上，獻給耶和華為燔祭。
43:25 每天要獻公山羊一隻為贖罪祭，也要獻公牛犢一隻和羊群中的公綿羊一隻，都要沒有殘疾的，如此辦理七天。
43:26 要這樣七天為壇贖罪，潔淨壇，壇就被奉獻了。
43:27 這些日子滿了以後，從第八天起，祭司要在壇上獻你們的燔祭和平安祭，我就悅納你們。這是主耶和華說的。`,

  '6/25': `44:1 他帶我回到朝外聖所朝東的外門，這門關著。
44:2 耶和華對我說：這門要關閉，不可敞開，誰也不可由其中進入，因為耶和華以色列的神已由其中進入，所以要關閉。
44:3 至於王，他是王，要坐在這門的門廊裡在耶和華面前吃飯，他要由這門的門廊而入，也由這門而出。
44:4 他帶我由北門來到殿前，我觀看，見耶和華的榮耀充滿了耶和華的殿，我就俯伏在地。

44:6 你要對那悖逆的以色列家說：主耶和華如此說：以色列家啊，你們所行的一切可憎的事可以止住了。

44:8 你們沒有看守我的聖物，卻為你們自己在聖所立人代守。
44:9 主耶和華如此說：以色列中一切外邦人，就是身心未受割禮的，都不可進入我的聖所。

44:12 他們因曾在偶像前服事這些百姓，使以色列家陷入罪孽，所以我向他們舉手起誓，他們必擔當自己的罪孽，是主耶和華說的。
44:13 他們不可走近我，不可給我供祭司的職，也不可近我聖物中的至聖物，卻要擔當他們的羞辱，就是所行可憎之事的羞辱。
44:14 然而，我要使他們看守殿，辦其中一切的使役，辦殿中所需辦的事。
44:15 以色列人走迷的時候，祭司利未人撒督的子孫卻看守了我聖所的職分，他們要近前來事奉我，站在我面前將脂油與血獻給我，這是主耶和華說的。
44:16 他們要進入我的聖所，就近我的桌子事奉我，守我所吩咐的。
44:17 他們進入內院門的時候，要穿細麻衣；在內院門和殿內供職的時候，不可穿羊毛衣服。
44:18 他們頭上要戴細麻布的冠冕，腰要束細麻布的褲子，不可穿使人出汗的衣服。
44:19 他們出到外院，進入外院到民那裡的時候，要脫下供職的衣服，放在聖屋裡，穿上別的衣服，免得因聖衣使民成聖。
44:20 他們不可剃頭，也不可蓄長髮，只要剪短頭髮。
44:21 祭司進內院的時候，都不可喝酒。
44:22 他們不可娶寡婦和被休的婦人為妻，只可娶以色列後裔中的處女，或娶祭司留下的寡婦。
44:23 他們要教導我的民分辨聖俗，使他們分辨潔淨與不潔淨的。
44:24 有爭訟的事，他們要站著判斷，要按我的典章判斷，守我一切的法則和條例，並要守我的安息日為聖日。
44:25 他們不可進到死人那裡使自己不潔淨，只可為父親、母親、兒子、女兒、弟兄，和未嫁人的姐妹使自己不潔淨。
44:26 人潔淨之後，要再給他計算七天。

44:31 祭司不可吃自死的或被野獸撕裂的鳥獸。`,

  '6/26': `45:1 你們拈鬮將地分給以色列各支派為業的時候，要將一份地作為獻給耶和華的聖地，長二萬五千肘，寬一萬肘；這一帶之地四圍都要成為聖地。
45:2 其中要有聖所一塊，長五百肘，寬五百肘，四圍有空地五十肘。
45:3 在這量度之地內，要量長二萬五千肘，寬一萬肘的地，其中要有聖所，就是至聖之地。
45:4 這地是聖地，從這地中要有為侍奉聖所的祭司所得的地，就是進前來事奉耶和華的人所得的地；這地要作他們房屋的基地，並作聖所的聖地。
45:5 又量長二萬五千肘，寬一萬肘的地，這地要歸在殿中事奉的利未人，作為他們居住的城邑。
45:6 你們要給城邑指定一塊地，寬五千肘，長二萬五千肘，這與聖地並排，要歸以色列全家。
45:7 歸王的地在聖地和城邑地的兩旁，靠近聖地和城邑地，在西要往西，在東要往東；長與各支派的地相等，東至東界，西至西界。
45:8 這地在以色列中作王的地業。我所立的王不再欺壓我的民，要按支派將地業分給以色列家。
45:9 主耶和華如此說：以色列的王啊，這就夠了！要除掉強暴和搶奪的事，施行公平和公義，停止奪取我民地業的事，這是主耶和華說的。
45:10 你們要用公道的天平、公道的伊法、公道的罷特。
45:11 伊法和罷特要量一樣，就是罷特要能盛賀梅珥的十分之一，伊法也要能盛賀梅珥的十分之一；其量要照賀梅珥定規。
45:12 一舍客勒是二十季拉；二十舍客勒，二十五舍客勒，十五舍客勒，要作你們的彌那。
45:13 你們所當奉的供物是這樣：一賀梅珥麥子要奉六分之一伊法；一賀梅珥大麥也要奉六分之一伊法。
45:14 論到油，每柯珥油（就是十罷特，又名一賀梅珥，因為十罷特就是一賀梅珥）要奉十分之一罷特。
45:15 以色列肥美的草場每二百隻中要奉一隻羊，作素祭、燔祭，並平安祭，為以色列民贖罪，這是主耶和華說的。
45:16 國中的眾民都要把這供物給以色列的王。
45:17 王要辦以色列家在各節期的燔祭、素祭、奠祭、逾越節，並各安息日和以色列家一切節期的事，也要辦贖罪祭、素祭、燔祭，並平安祭，為以色列家贖罪。
45:18 主耶和華如此說：正月初一日，你要取無殘疾的公牛犢，潔淨聖所。
45:19 祭司要取些贖罪祭牲的血，抹在殿的門框、壇台四角的沿上，並內院門的門框上。
45:20 當月初七日，你要為誤犯罪的和愚昧無知犯罪的人如此而行，你們要為殿贖罪。
45:21 正月十四日，你們要守逾越節，這節要吃無酵餅，共守七天。
45:22 當那日，王要為自己和國中的眾民預備公牛為贖罪祭。
45:23 這節七天，每天要獻無殘疾的公牛七隻、公綿羊七隻，為耶和華作燔祭；每天獻公山羊一隻為贖罪祭。
45:24 他所獻的素祭，每公牛要獻細麵一伊法，每公綿羊獻細麵一伊法；每伊法細麵加油一欣。
45:25 七月十五日的節，七天他也要這樣辦理，贖罪祭、燔祭、素祭，和油都照樣辦。`,

  '6/27': `46:1 主耶和華如此說：內院朝東的門，在六個工作的日子要關閉，在安息日要敞開，在朔日也要敞開。
46:2 王要從這門的門廊進入，站在門的門框旁邊，祭司要獻他的燔祭和平安祭；他就在門口敬拜，然後出去，這門直到晚上才關閉。
46:3 在安息日和朔日，這地的眾民也要在這門口耶和華面前敬拜。
46:4 安息日，王要將燔祭獻給耶和華，就是無殘疾的羊羔六隻，並無殘疾的公綿羊一隻；
46:5 素祭，每公綿羊獻細麵一伊法，每羊羔獻素祭量多量少由他自動而定；每伊法細麵加油一欣。
46:6 朔日，要獻無殘疾的公牛犢一隻，羊羔六隻，公綿羊一隻，都要沒有殘疾的。
46:7 他要獻素祭，每公牛和公綿羊各獻細麵一伊法，每羊羔量多量少由他自動而定；每伊法細麵加油一欣。
46:8 王進來的時候，要從這門的門廊進入，也要由這門出去。
46:9 各節期，這地的眾民朝見耶和華的時候，從北門進入敬拜的，要從南門而出；從南門進入的，要從北門而出，不可從所進的門而出，要從對面的門出去。
46:10 他們進入的時候，王要在他們中間進入；他們出去的時候，王也要出去。
46:11 在各節期和聖會的時候，素祭每公牛要獻細麵一伊法，每公綿羊要獻細麵一伊法；每羊羔量多量少由他自動而定；每伊法細麵加油一欣。
46:12 王獻甘心祭，無論是燔祭，是平安祭，是向耶和華甘心獻的，有人要給他開朝東的門，他就獻他的燔祭和平安祭，如同在安息日所獻的；他出去之後，要把門關上。
46:13 每天你要獻一歲沒有殘疾的羊羔一隻為燔祭，要每早晨獻一隻。
46:14 每早晨要同獻素祭，就是細麵六分之一伊法，並油三分之一欣，為常獻的素祭，這在耶和華面前是永遠的定例。
46:15 這樣，每早晨要獻羊羔、素祭，並油，為常獻的燔祭。
46:16 主耶和華如此說：王若將產業賜給他的兒子，這產業要歸他的兒子，是屬他們的業，是可以承受為業的。
46:17 但王若將產業賜給他的臣僕，這產業要歸臣僕到自由之年；以後還要歸王；王的產業只可傳給他的兒子。
46:18 王不可奪取民的產業，不可侵佔他們的地業；他要從自己的地業中，把產業賜給他的兒子，免得我的民離散，各人失去他的地業。
46:19 他帶我從門旁的門口進入祭司的聖房，就是朝北的聖房，在那裡有一個地方靠著西邊。
46:20 他對我說：這是祭司煮贖愆祭、贖罪祭，並烤素祭之地，免得帶到外院，在民中使人成聖。
46:21 他帶我出到外院，使我從院的四角走過；我見外院各角都有院子。
46:22 外院四角的院子，每院長四十肘，寬三十肘，這四個角上的院子量度一樣。
46:23 這四個院子四圍有牆，牆根有煮食的地方。
46:24 他對我說：這是廚房，殿的侍役在這裡煮百姓的祭物。`,

  '6/28': `47:1 他帶我回到殿門，見殿的門檻以下有水往東流出（原來殿面朝東），水從殿的右邊、祭壇的南邊流出。
47:2 他帶我從北門出去，由外道帶我到朝東的外門，見水從右邊流出。
47:3 那人往東出去，手拿準繩，量了一千肘，使我從水中過去，水深到踝子骨。
47:4 他又量了一千肘，使我從水中過去，水深到膝；又量了一千肘，使我過去，水深到腰；
47:5 又量了一千肘，水深成河，使我不能過去，因為水勢甚深，成了可以游泳、不可走過去的水。
47:6 他對我說：人子啊，你看見了甚麼？他就帶我回到河邊。
47:7 我回到河邊，見在河的兩岸有極多的樹木。
47:8 他對我說：這水往東方去，流下到亞拉巴，直到海；所發出來的水流到海裡，海中的水就必得醫治。
47:9 這河所到之處，凡滋生的動物都必生活，並且因這水流到那裡，海中的魚也甚多，因為這水到那裡，海水就變甜了；這河所到之處，百物都必生活。
47:10 必有漁夫站在河邊，從隱基底直到隱以革蓮，都作曬網之處；那裡的魚各從其類，好像大海的魚甚多。
47:11 只是沼澤和窪地不得治好，要留為出鹽之所。
47:12 在河的兩岸，各樣結果子的樹，枝葉都不枯乾，果子也不斷絕，每月都結新果子，因為這水是從聖所流出來的；其上的果子作食物，其葉子作藥材。
47:13 主耶和華如此說：以色列十二支派分地業為業，要以這地為界；約瑟要得兩分。
47:14 你們要彼此平分，我曾舉手起誓，應許將這地給你們的列祖，這地必歸你們為業。
47:15 這地的四界：北邊從大海，走哈特隆路，到西達達，
47:16 哈末，比羅他，示巴臨（在大馬色和哈末境界之間），以及豪蘭境界的哈薩亥提根。
47:17 所以北界從大海到哈薩以難，北邊以大馬色地，南邊以哈末地為界，這是北界。
47:18 東邊從豪蘭、大馬色，並基列，以色列地中間，以約旦河為界，從北界量起，直到東海，這是東界。
47:19 南邊從他瑪到米利巴加低斯的水，再到埃及小河，直到大海，這是南界。
47:20 西邊就是大海，從南界到哈末的正對面，這是西界。
47:21 你們要按以色列的各支派，將這地在你們中間分了。
47:22 你們要拈鬮，將這地分給你們自己和寄居在你們中間、在你們中間生了兒女的外人為業；他們在以色列人中與你們一同算為本地人，要與你們一同在以色列支派中分地為業。
47:23 外人寄居在哪支派中，你們就在那裡分地給他，這是主耶和華說的。`,

  '7/1': `1:1 耶穌基督的僕人保羅，奉召為使徒，特派傳神的福音。
1:2 這福音是神從前藉眾先知在聖經上所應許的，
1:3 論到他兒子我主耶穌基督；按肉體說，是從大衛後裔生的；
1:4 按聖善的靈說，因從死裡復活，以大能顯明是神的兒子。
1:5 我們從他受了恩惠並使徒的職分，在萬國之中叫人為他的名信服真道；
1:6 其中也有你們這蒙召屬耶穌基督的人。
1:7 我寫信給你們在羅馬、蒙神愛、奉召作聖徒的眾人。願恩惠、平安從我們的父神並主耶穌基督歸與你們！
1:8 第一，我靠著耶穌基督，為你們眾人感謝我的神，因為你們的信德傳遍了天下。
1:9 我在福音上用心靈事奉神的，他可以見證我怎樣不住的提到你們，
1:10 在禱告之間常常懇求，或者照神的旨意，終能得平坦的道路往你們那裡去。
1:11 因為我切切地想見你們，要把些屬靈的恩賜分給你們，使你們可以堅固；
1:12 這樣，我在你們中間，因你我彼此的信心，可以同得安慰。
1:13 弟兄們，我不願意你們不知道，我屢次定意往你們那裡去，要在你們中間得些果子，如同在其餘的外邦人中一樣，只是到如今仍有阻隔。
1:14 無論是希臘人、化外人、聰明人、愚拙人，我都欠他們的債，
1:15 所以情願盡我的力量，將福音也傳給你們在羅馬的人。
1:16 我不以福音為恥；這福音本是神的大能，要救一切相信的，先是猶太人，後是希臘人。
1:17 因為神的義正在這福音上顯明出來；這義是本於信，以至於信。如經上所記：「義人必因信得生。」
1:18 原來，神的忿怒從天上顯明在一切不虔不義的人身上，就是那些行不義阻擋真理的人。
1:19 神的事情，人所能知道的，原顯明在人心裡，因為神已經給他們顯明。
1:20 自從造天地以來，神的永能和神性是明明可知的，雖是眼不能見，但藉著所造之物就可以曉得，叫人無可推諉。
1:21 因為，他們雖然知道神，卻不當作神榮耀他，也不感謝他，他們的思念變為虛妄，無知的心就昏暗了。
1:22 自稱為聰明，反成了愚拙，
1:23 將不能朽壞之神的榮耀變為偶像，彷彿必朽壞的人和飛禽、走獸、昆蟲的樣式。
1:24 所以，神任憑他們逞著心裡的情慾行污穢的事，以致彼此玷辱自己的身體。
1:25 他們將神的真實變為虛謊，去敬拜事奉受造之物，不敬奉那造物的主；主乃是可稱頌的，直到永遠。阿們！
1:26 因此，神任憑他們放縱可羞恥的情慾。他們的女人把順性的用處變為逆性的用處；
1:27 男人也是如此，棄了女人順性的用處，慾火攻心，彼此貪戀，男和男行可羞恥的事，就在自己身上受這妄為當得的報應。
1:28 他們既然故意不認識神，神就任憑他們存邪僻的心，行那些不合理的事；
1:29 裝滿了各樣不義、邪惡、貪婪、惡毒；滿心是嫉妒、兇殺、爭競、詭詐、毒恨；
1:30 又是讒毀的、背後說人的、怨恨神的、侮慢人的、狂傲的、自誇的、捏造惡事的、違背父母的、
1:31 無知的、背約的、無親情的、不憐憫人的。
1:32 他們雖知道神判定行這樣事的人是當死的，然而他們不但自己去行，還喜歡別人去行。`,

  '7/2': `2:1 你這論斷人的，無論你是誰，也無可推諉。你在甚麼事上論斷人，就在甚麼事上定自己的罪；因你這論斷人的，自己所行卻和別人一樣。
2:2 我們知道這樣行的人，神必照真理審判他。
2:3 你這人哪，你論斷行這樣事的人，自己所行的卻和別人一樣，你以為能逃脫神的審判嗎？
2:4 還是你藐視他豐富的恩慈、寬容、忍耐，不曉得他的恩慈是領你悔改呢？
2:5 你竟任著你剛硬不悔改的心，為自己積蓄忿怒，以致神震怒、顯他公righteous審判的日子來到。
2:6 他必照各人的行為報應各人：
2:7 凡恆心行善、尋求榮耀、尊貴和不能朽壞之福的，就以永生報應他們；
2:8 惟有結黨、不順從真理、反順從不義的，就以忿怒、惱恨報應他們；
2:9 將患難、困苦加給一切作惡的人，先是猶太人，後是希臘人；
2:10 卻將榮耀、尊貴、平安加給一切行善的人，先是猶太人，後是希臘人。
2:11 因為神不偏待人。
2:12 凡沒有律法犯了罪的，也必不按律法滅亡；凡在律法以下犯了罪的，也必按律法受審判。
2:13 原來在神面前，不是聽律法的為義，乃是行律法的稱義。
2:14 沒有律法的外邦人若順著本性行律法上的事，他們雖然沒有律法，自己就是自己的律法。
2:15 這是顯出律法的功用刻在他們心裡，他們是非之心同作見證，並且他們的思念互相較量，或以為是，或以為非。
2:16 就在神藉耶穌基督審判人隱祕事的日子，照我的福音所言。
2:17 你稱為猶太人，又倚靠律法，並以歸於神為誇；
2:18 又曉得神的旨意，並能分別是非，是受過律法教訓的；
2:19 又深信自己是給瞎子領路的，是黑暗中人的光，
2:20 是蠢笨人的師傅，是小孩子的先生，在律法上有知識和真理的模範。
2:21 你既是教導別人，還不教導自己嗎？你講說人不可偷竊，自己還偷竊嗎？
2:22 你說人不可姦淫，自己還姦淫嗎？你厭惡偶像，自己還偷竊廟中之物嗎？
2:23 你以律法自誇，自己倒犯律法，藐視神嗎？
2:24 神的名在外邦人中，因你們受了褻瀆，正如經上所記的。
2:25 你若行律法，割禮固然於你有益；若犯了律法，你的割禮就算沒有割禮。
2:26 所以那未受割禮的，若遵守律法的條例，他雖然未受割禮，豈不算是有割禮嗎？
2:27 而且那本來未受割禮的，若能全守律法，豈不是要審判你這有儀文和割禮竟犯律法的人嗎？
2:28 因為外面是猶太人的，不是真猶太人；外面肉身的割禮，也不是真割禮。
2:29 惟有裡面是猶太人的，才是真猶太人；真割禮也是心裡的，在乎靈，不在乎儀文。這人的稱讚不是從人來的，乃是從神來的。`,

  '7/3': `3:1 這樣說來，猶太人有甚麼長處？割禮有甚麼益處呢？
3:2 凡事大有好處：第一是神的聖言交託他們。
3:3 即便有不信的，這有何妨呢？難道他們的不信就廢掉神的信嗎？
3:4 斷乎不能！不如說，神是真實的，人都是虛謊的。如經上所記：「你責備人的時候，顯為公義；被人議論的時候，可以得勝。」
3:5 我們的不義若顯出神的義來，我們可以怎麼說呢？神降怒，是他不義嗎？（我說的是人的常話。）
3:6 斷乎不能！若是這樣，神怎能審判世界呢？
3:7 若神的真實，因我的虛謊越發顯出他的榮耀，為甚麼我還受審判，好像罪人呢？
3:8 為甚麼不說「我們可以作惡以成善呢？」——這是謗讟我們的人說我們有這意思。這等人受罰是該當的。
3:9 這卻怎麼樣呢？我們比他們強嗎？決不是的！因我們已經證明，猶太人和希臘人都在罪惡之下。
3:10 就如經上所記：「沒有義人，連一個也沒有。
3:11 沒有明白的；沒有尋求神的；
3:12 都是偏離正路，一同變為無用。沒有行善的，連一個也沒有。
3:13 他們的喉嚨是敞開的墳墓；他們用舌頭弄詭詐；嘴唇裡有虺蛇的毒氣；
3:14 滿口是咒罵苦毒。
3:15 殺人流血，他們的腳飛跑；
3:16 所經過的路便行殘害暴虐的事；
3:17 平安的路他們沒有走過；
3:18 他們眼中不怕神。」
3:19 我們曉得律法上的話都是對律法以下之人說的，好塞住各人的口，叫普世的人都伏在神審判之下；
3:20 所以凡有血氣的，沒有一個因行律法能在神面前稱義，因為律法本是叫人知罪。
3:21 但如今，神的義在律法以外已經顯明出來，有律法和先知為證：
3:22 就是神的義，因信耶穌基督加給一切相信的人，並沒有分別。
3:23 因為世人都犯了罪，虧缺了神的榮耀；
3:24 如今卻蒙神的恩典，因基督耶穌的救贖，就白白地稱義。
3:25 神設立耶穌作挽回祭，是憑著耶穌的血，藉著人的信，要顯明神的義；因為他用忍耐的心寬容人先時所犯的罪，
3:26 好在今時顯明他的義，使人知道他自己為義，也稱信耶穌的人為義。
3:27 既是這樣，哪裡能誇口呢？沒有可誇的了。用何法沒有的呢？是用立功之法嗎？不是，乃用信主之法。
3:28 所以我們看定了：人稱義是因著信，不在乎遵行律法。
3:29 難道神只作猶太人的神嗎？不也是作外邦人的神嗎？是的，也作外邦人的神。
3:30 神是一位；他要因信稱那受割禮的為義，也要因信稱那未受割禮的為義。
3:31 這樣，我們因信廢了律法嗎？斷乎不是！更是堅固律法。`,

  '7/4': `4:1 如此說來，我們的祖宗亞伯拉罕憑著肉體得了甚麼呢？
4:2 倘若亞伯拉罕是因行為稱義，就有可誇的；只是在神面前並無可誇。
4:3 經上說甚麼呢？說：「亞伯拉罕信神，這就算為他的義。」
4:4 做工的得工價，不算恩典，乃是該得的；
4:5 惟有不做工的，只信稱罪人為義的神，他的信就算為義。
4:6 正如大衛稱那在行為以外蒙神算為義的人是有福的。
4:7 他說：「得赦免其過、遮蓋其罪的，這人是有福的。
4:8 主不算為有罪的，這人是有福的。」
4:9 如此說來，這福是單加給那受割禮的人嗎？還是也加給那未受割禮的人呢？我們說：「亞伯拉罕的信，是算為他的義。」
4:10 是怎麼算的呢？是在他受割禮的時候呢？還是在他未受割禮的時候呢？不是在受割禮的時候，乃是在未受割禮的時候。
4:11 並且他受了割禮的記號，作他未受割禮的時候因信稱義的印證，叫他作一切未受割禮而信之人的父，使他們也算為義；
4:12 又作受割禮之人的父，就是那些不但受割禮，並且按我們的祖宗亞伯拉罕未受割禮而有的那種信心去行事為人的人。
4:13 因為神應許亞伯拉罕和他後裔，必得承受世界，這不是因律法，乃是因信而得的義。
4:14 若是屬乎律法的人才得為後嗣，信就歸於虛空，應許也就廢棄了；
4:15 因為律法是惹動忿怒的（在沒有律法的地方，也就沒有過犯）。
4:16 所以人得為後嗣是本乎信，因此就屬乎恩，叫應許對亞伯拉罕一切後裔都堅定，不但對那屬乎律法的，也對那效法亞伯拉罕之信的。
4:17 亞伯拉罕所信的，是那叫死人復活、使無變為有的神，他在主面前作我們世人的父。如經上所記：「我已經立你作多國的父。」
4:18 他在無可指望的時候，因信仍有指望，就得以作多國的父，正如先前所說：「你的後裔將要如此。」
4:19 他將近百歲的時候，雖然想到自己的身體如同已死，撒拉的生育已經斷絕，他的信心還是不軟弱；
4:20 並且仰望神的應許，總沒有因不信心裡起疑惑，反倒因信心裡得堅固，將榮耀歸給神，
4:21 且滿心相信神所應許的必能做到。
4:22 所以，這就算為他的義。
4:23 「算為他義」這句話，不是單為他寫的，
4:24 也是為我們將來得算為義之人寫的，就是我們這信神使我們的主耶穌從死裡復活的人。
4:25 耶穌被交給人，是為我們的過犯；復活，是為叫我們稱義。`,

  '7/5': `5:1 我們既因信稱義，就藉著我們的主耶穌基督得與神相和。
5:2 我們又藉著他，因信得進入現在所站的這恩典中，並且歡歡喜喜盼望神的榮耀。
5:3 不但如此，就是在患難中也是歡歡喜喜的；因為知道患難生忍耐，
5:4 忍耐生老練，老練生盼望；
5:5 盼望不至於羞恥，因為所賜給我們聖靈將神的愛澆灌在我們心裡。
5:6 因我們還軟弱的時候，基督就按所定的日期為罪人死。
5:7 為義人死，是少有的；為仁人死，或者有敢做的。
5:8 惟有基督在我們還作罪人的時候為我們死，神的愛就在此向我們顯明了。
5:9 現在我們既靠著他的血稱義，就更要藉著他免去神的忿怒。
5:10 因為我們作仇敵的時候，且藉著神兒子的死，得與神和好；既已和好，就更要因他的生得救了。
5:11 不但如此，我們既藉著我主耶穌基督得與神和好，也就藉著他以神為樂。
5:12 這就如罪是從一人入了世界，死又是從罪來的，於是死就臨到眾人，因為眾人都犯了罪。
5:13 沒有律法之先，罪已經在世上；但沒有律法，罪也不算罪。
5:14 然而從亞當到摩西，死就作了王，連那些不與亞當犯一樣罪過的，也在他的權下。亞當乃是那以後來之人的預像。
5:15 只是過犯不如恩賜，若因一人的過犯，眾人都死了，何況神的恩典與那因耶穌基督一人恩典中的賞賜，豈不更加倍地臨到眾人嗎？
5:16 因一人犯罪就定罪，也不如恩賜，原來審判是由一人而定罪，恩賜乃是由許多過犯而稱義。
5:17 若因一人的過犯，死就藉著這一人作了王，何況那些受洪恩又蒙所賜之義的，豈不更要藉著耶穌基督一人在生命中作王嗎？
5:18 如此說來，因一次的過犯，眾人都被定罪；照樣，因一次的義行，眾人也就被稱義得生命了。
5:19 因一人的悖逆，眾人成為罪人；照樣，因一人的順從，眾人也成為義了。
5:20 律法本是外添的，叫過犯顯多；只是罪在哪裡顯多，恩典就更顯多了；
5:21 叫罪作王是在死中，照樣，恩典也藉著義作王，叫人因我們的主耶穌基督得永生。`,

  '7/6': `6:1 這樣，我們可以繼續在罪中，叫恩典顯多嗎？
6:2 斷乎不可！我們在罪上死了的人豈可仍在罪中活著呢？
6:3 豈不知我們這受洗歸入基督耶穌的人，是受洗歸入他的死嗎？
6:4 所以，我們藉著洗禮歸入死，和他一同埋葬，原是叫我們一舉一動有新生的樣式，像基督藉著父的榮耀從死裡復活一樣。
6:5 我們若在他死的形狀上與他聯合，也要在他復活的形狀上與他聯合；
6:6 因為知道我們的舊人和他同釘十字架，使罪身滅絕，叫我們不再作罪的奴僕；
6:7 因為已死的人是脫離了罪。
6:8 我們若是與基督同死，就信必與他同活；
6:9 因為知道基督既從死裡復活，就不再死，死也不再作他的主了。
6:10 他死是向罪死了，只有一次；他活是向神活著。
6:11 這樣，你們向罪也當看自己是死的；向神在基督耶穌裡，卻當看自己是活的。
6:12 所以，不要容罪在你們必死的身上作王，使你們順從身子的私慾；
6:13 也不要將你們的肢體獻給罪作不義的器具；倒要像從死裡復活的人，將自己獻給神，並將肢體作義的器具獻給神。
6:14 罪必不能作你們的主；因你們不在律法之下，乃在恩典之下。
6:15 這卻怎麼樣呢？我們在恩典之下，不在律法之下，就可以犯罪嗎？斷乎不可！
6:16 你們豈不曉得，你們獻自己作奴僕，順從誰，就作誰的奴僕嗎？或作罪的奴僕，以至於死；或作順命的奴僕，以至成義。
6:17 感謝神！因為你們從前雖然作罪的奴僕，現在卻從心裡順服了所傳給你們道理的模範。
6:18 你們既從罪裡得了釋放，就作了義的奴僕。
6:19 我因你們肉體的軟弱，就照人的常話對你們說。你們從前怎樣將肢體獻給不潔不法作奴僕，以至於不法；現在也要照樣將肢體獻給義作奴僕，以至於成聖。
6:20 你們作罪之奴僕的時候，就不被義約束了。
6:21 你們現在因所作的事有甚麼果子呢？那些事的結局就是死，你們現在以那些事為恥了。
6:22 但現在，你們既從罪裡得了釋放，作了神的奴僕，就有成聖的果子，那結局就是永生。
6:23 因為罪的工價乃是死；惟有神的恩賜，在我們的主基督耶穌裡，乃是永生。`,

  '7/7': `7:1 弟兄們，我現在對明白律法的人說，你們豈不曉得律法管人是在活著的時候嗎？
7:2 就如女人有了丈夫，丈夫還活著，就被律法約束；丈夫若死了，就脫離了丈夫的律法。
7:3 所以丈夫活著，她若歸於別人，便叫淫婦；丈夫若死了，她就脫離了丈夫的律法，雖然歸於別人，也不是淫婦了。
7:4 我的弟兄們，這樣說來，你們藉著基督的身體，在律法上也是死了，叫你們歸於別人，就是歸於那從死裡復活的，叫我們結果子給神。
7:5 因為我們屬肉體的時候，那藉著律法的惡慾就在我們肢體中發動，結成死亡的果子。
7:6 但我們既然在捆我們的律法上死了，現今就脫離了律法，叫我們服事主，要按著心靈的新樣，不按著儀文的舊樣。
7:7 這樣，我們可說甚麼呢？律法是罪嗎？斷乎不是！只是非因律法，我就不知何為罪。非律法說「不可起貪心」，我就不知何為貪心。
7:8 然而罪趁著機會，就藉著誡命叫諸般的貪心在我裡頭發動；因為沒有律法，罪是死的。
7:9 我以前沒有律法是活著的；但是誡命來到，罪又活了，我就死了。
7:10 那本來叫人活的誡命，反倒叫我死；
7:11 因為罪趁著機會，就藉著誡命引誘我，並且殺了我。
7:12 這樣看來，律法是聖潔的，誡命也是聖潔、公義、良善的。
7:13 既然如此，那良善的是叫我死嗎？斷乎不是！叫我死的乃是罪。但罪藉著那良善的叫我死，就顯出真是罪，叫罪因著誡命更顯出是惡極了。
7:14 我們原曉得律法是屬乎靈的，但我是屬乎肉體的，是已經賣給罪了。
7:15 因為我所做的，我自己不明白；我所願意的，我並不做；我所恨惡的，我倒去做。
7:16 若我所做的，是我所不願意的，我就應承律法是善的。
7:17 既是這樣，做這事的就不再是我，乃是住在我裡頭的罪。
7:18 我也知道在我裡頭，就是我肉體之中，沒有良善。因為，立志為善由得我，只是行出來由不得我。
7:19 故此，我所願意的善，我反不做；我所不願意的惡，我倒去做。
7:20 若我去做所不願意做的，就不再是我做，乃是住在我裡頭的罪做的。
7:21 我覺得有個律，就是我願意為善的時候，便有惡與我同在。
7:22 因為按著我裡面的意思，我是喜歡神的律；
7:23 但我覺得肢體中另有個律和我心中的律交戰，把我擄去，叫我附從那肢體中犯罪的律。
7:24 我真是苦啊！誰能救我脫離這取死的身體呢？
7:25 感謝神，靠著我們的主耶穌基督就能脫離了。這樣看來，我以內心順服神的律，我肉體卻順服罪的律了。`,

  '7/8': `8:1 如今，那些在基督耶穌裡的就不定罪了。
8:2 因為賜生命聖靈的律，在基督耶穌裡釋放了我，使我脫離罪和死的律了。
8:3 律法既因肉體軟弱，有所不能行的，神就差遣自己的兒子，成為罪身的形狀，作了贖罪祭，在肉體中定了罪案，
8:4 使律法的義成就在我們這不隨從肉體、只隨從聖靈的人身上。
8:5 因為隨從肉體的人體貼肉體的事，隨從聖靈的人體貼聖靈的事。
8:6 體貼肉體的，就是死；體貼聖靈的，乃是生命、平安。
8:7 原來體貼肉體的，就是與神為仇；因為不服神的律法，也是不能服，
8:8 而且屬肉體的人不能得神的喜歡。
8:9 如果神的靈住在你們心裡，你們就不屬肉體，乃屬聖靈了。人若沒有基督的靈，就不是屬基督的。
8:10 基督若在你們心裡，身體就因罪而死，心靈卻因義而活。
8:11 然而叫耶穌從死裡復活者的靈若住在你們心裡，那叫基督耶穌從死裡復活的，也必藉著住在你們心裡的聖靈，使你們必死的身體又活過來。
8:12 弟兄們，這樣看來，我們並不是欠肉體的債去順從肉體活著。
8:13 你們若順從肉體活著，必要死；若靠著聖靈治死身體的惡行，必要活著。
8:14 因為凡被神的靈引導的，都是神的兒子。
8:15 你們所受的，不是奴僕的心，仍舊害怕；所受的，乃是兒子的心，因此我們呼叫：「阿爸！父！」
8:16 聖靈與我們的心同證我們是神的兒女；
8:17 既是兒女，便是後嗣，就是神的後嗣，和基督同作後嗣。如果我們和他一同受苦，也必和他一同得榮耀。
8:18 我想現在的苦楚若比起將來要顯於我們的榮耀，就不足介意了。
8:19 受造之物切望等候神的眾子顯出來。
8:20 因為受造之物服在虛空之下，不是自己願意，乃是因那叫他如此的。
8:21 但受造之物仍然指望脫離敗壞的轄制，得享神兒女自由的榮耀。
8:22 我們知道一切受造之物一同歎息、勞苦，直到如今。
8:23 不但如此，就是我們這有聖靈初結果子的，也是自己心裡歎息，等候得著兒子的名分，乃是我們的身體得贖。
8:24 我們得救是在乎盼望；只是所見的盼望不是盼望，誰還盼望他所見的事呢？
8:25 但我們若盼望那所不見的事，就必忍耐等候。
8:26 況且，我們的軟弱有聖靈幫助，我們本不曉得當怎樣禱告，只是聖靈親自用說不出來的歎息替我們禱告。
8:27 鑒察人心的，曉得聖靈的意思，因為聖靈照著神的旨意替聖徒祈求。
8:28 我們曉得萬事都互相效力，叫愛神的人得益處，就是按他旨意被召的人。
8:29 因為他預先所知道的人，就預先定下效法他兒子的模樣，使他兒子在許多弟兄中作長子。
8:30 預先所定下的人又召他們來；所召來的人又稱他們為義；所稱為義的人又叫他們得榮耀。
8:31 既是這樣，還有甚麼說的呢？神若幫助我們，誰能敵擋我們呢？
8:32 神既不愛惜自己的兒子，為我們眾人捨了，豈不也把萬物和他一同白白地賜給我們嗎？
8:33 誰能控告神所揀選的人呢？有神稱他們為義了。
8:34 誰能定他們的罪呢？有基督耶穌已經死了，而且從死裡復活，現今在神的右邊，也替我們祈求。
8:35 誰能使我們與基督的愛隔絕呢？難道是患難嗎？是困苦嗎？是逼迫嗎？是飢餓嗎？是赤身露體嗎？是危險嗎？是刀劍嗎？
8:36 如經上所記：「我們為你的緣故終日被殺；人看我們如將宰的羊。」
8:37 然而，靠著愛我們的主，在這一切的事上已經得勝有餘了。
8:38 因為我深信無論是死，是生，是天使，是掌權的，是有能的，是現在的事，是將來的事，
8:39 是高處的，是低處的，是別的受造之物，都不能叫我們與神的愛隔絕；這愛是在我們的主基督耶穌裡的。`,

  '7/9': `9:1 我在基督裡說真話，並不謊言，有我的良心被聖靈感動，給我作見證：
9:2 我是大有憂愁，心裡時常傷痛；
9:3 為我弟兄，我骨肉之親，就是自己被咒詛，與基督分離，我也願意。
9:4 他們是以色列人；那兒子的名分、榮耀、諸約、律法、禮儀、應許都是他們的。
9:5 列祖就是他們的祖宗；按肉體說，基督也是從他們出來的，他是在萬有之上，永遠可稱頌的神。阿們！
9:6 這不是說神的話落了空。因為從以色列生的，不都是以色列人；
9:7 也不因為是亞伯拉罕的後裔，就都作他的兒女；惟獨「從以撒生的，才要稱為你的後裔。」
9:8 這就是說，肉身所生的兒女不是神的兒女，惟獨那應許的兒女才算是後裔。
9:9 因為所應許的話是這樣說：「到明年這時候我要來，撒拉必生一個兒子。」
9:10 不但如此，還有利百加，既從一個人，就是從我們的祖宗以撒懷了孕，
9:11 雙子還沒有生下來，善惡還沒有做出來，為要顯明神揀選人的旨意，不在乎人的行為，乃在乎召人的主，
9:12 神就對利百加說：「將來大的要服事小的。」
9:13 正如經上所記：「雅各是我所愛的，以掃是我所惡的。」
9:14 這樣，我們可說甚麼呢？難道神有不公平的地方嗎？斷乎沒有！
9:15 因他對摩西說：「我要憐憫誰，就憐憫誰；要恩待誰，就恩待誰。」
9:16 據此看來，這不在乎那定意的，也不在乎那奔跑的，只在乎發憐憫的神。
9:17 因為經上有話向法老說：「我將你興起來，特要在你身上彰顯我的權能，並要使我的名傳遍天下。」
9:18 如此看來，神要憐憫誰，就憐憫誰；要叫誰剛硬，就叫誰剛硬。
9:19 這樣，你必對我說：「他為甚麼還指責人呢？有誰抗拒他的旨意呢？」
9:20 你這個人哪，你是誰，竟敢向神強嘴呢？受造之物豈能對造他的說：「你為甚麼這樣造我呢？」
9:21 窯匠難道沒有權柄從一團泥裡拿一塊做成貴重的器皿，又拿一塊做成卑賤的器皿嗎？
9:22 倘若神要顯明他的忿怒，彰顯他的權能，就多多忍耐寬容那可怒、預備遭毀滅的器皿，
9:23 又要將他豐盛的榮耀彰顯在那蒙憐憫、早預備得榮耀的器皿上，這有何不可呢？
9:24 這器皿就是我們被神所召的，不但是從猶太人中召來，也從外邦人中召來的。
9:25 就如神在何西阿書上說：「那本來不是我子民的，我要稱為我的子民；本來不是蒙愛的，我要稱為蒙愛的。」
9:26 「從前在甚麼地方對他們說，你們不是我的子民，將來就在那裡稱他們為永生神的兒子。」
9:27 以賽亞指著以色列人喊著說：「以色列人雖多如海沙，得救的不過是剩下的餘數；
9:28 因為主要在地上施行他的話，叫他的話都成全，速速地完結。」
9:29 又如以賽亞先前說過：「若不是萬軍之主給我們留下餘種，我們早已像所多瑪，蛾摩拉的樣子了。」
9:30 這樣說來，我們可說甚麼呢？那本來不追求義的外邦人反得了義，就是因信而得的義；
9:31 以色列人追求律法的義，反得不著律法的義。
9:32 這是甚麼緣故呢？是因為他們不憑著信心求，只憑著行為求，他們正跌在那絆腳石上。
9:33 就如經上所記：「我在錫安放一塊絆腳的石頭，跌人的磐石；信靠他的人必不至於羞愧。」`,

  '7/10': `10:1 弟兄們，我心裡所願的，向神所求的，是要以色列人得救。
10:2 我可以證明他們向神有熱心，但不是按著真知識；
10:3 因為他們不知道神的義，想要立自己的義，就不服神的義了。
10:4 律法的總結就是基督，使凡信他的都得著義。
10:5 摩西寫著說：「人若行那出於律法的義，就必因此活著。」
10:6 惟有出於信心的義如此說：「你不要心裡說：誰要升到天上去呢？」（就是要領基督降下來；）
10:7 「誰要下到陰間去呢？」（就是要領基督從死裡上來。）
10:8 他到底怎麼說呢？「這道離你不遠，正在你口裡，在你心裡」（就是我們所傳信主的道）。
10:9 你若口裡認耶穌為主，心裡信神叫他從死裡復活，就必得救；
10:10 因為人心裡相信，就可以稱義；口裡承認，就可以得救。
10:11 經上說：「凡信他的人必不至於羞恥。」
10:12 猶太人和希臘人並沒有分別，因為眾人同有一位主，他也厚待一切求告他的人。
10:13 因為「凡求告主名的，就必得救。」
10:14 然而，人未曾信他，怎能求他呢？未曾聽見他，怎能信他呢？沒有傳道的，怎能聽見呢？
10:15 若沒有奉差遣，怎能傳道呢？如經上所記：「報福音、傳喜信的人，他們的腳蹤何等佳美！」
10:16 只是人沒有都聽從福音，因為以賽亞說：「主啊，我們所傳的有誰信呢？」
10:17 可見信道是從聽道來的，聽道是從基督的話來的。
10:18 但我說，他們沒有聽見嗎？誠然聽見了。「他們的聲音傳遍天下，他們的言語傳到地極。」
10:19 但我說，以色列人不知道嗎？先有摩西說：「我要用那不成子民的，惹動你們的憤恨；我要用那無知的民，惹動你們的怒氣。」
10:20 又有以賽亞放膽說：「沒有尋找我的，我叫他們遇見；沒有訪問我的，我向他們顯現。」
10:21 至於以色列人，他說：「我整天伸手招呼那悖逆頂嘴的百姓。」`,

  '7/11': `11:1 我且說，神棄絕了他的百姓嗎？斷乎沒有！因為我也是以色列人，亞伯拉罕的後裔，便雅憫支派的人。
11:2 神並沒有棄絕他預先所知道的百姓。你們豈不曉得經上論到以利亞是怎麼說的呢？他在神面前怎樣控告以色列人說：
11:3 「主啊，他們殺了你的先知，拆了你的壇，只剩下我一個人，他們還要尋索我的命。」
11:4 神的回話是怎麼說的呢？說：「我為自己留下七千人，是未曾向巴力屈膝的。」
11:5 如今也是這樣，照著揀選的恩典，還有餘數。
11:6 既是出於恩典，就不在乎行為，不然，恩典就不是恩典了。
11:7 這樣說來，怎麼樣呢？以色列人所求的，他們沒有得著，惟有蒙揀選的人得著了，其餘的就成了頑梗不化的，
11:8 正如經上所記：「神給他們昏迷的心，眼睛不能看見，耳朵不能聽見，直到今日。」
11:9 大衛說：「願他們的筵席變為網羅，變為機檻，變為絆腳石，作他們的報應；
11:10 願他們的眼睛昏蒙，不得看見，願他們的腰常常彎曲。」
11:11 我且說，他們失腳，是要他們跌倒嗎？斷乎不是！反倒因他們的過失，救恩便臨到外邦人，要激動以色列人發憤。
11:12 若他們的過失，為天下的富足；他們的缺乏，為外邦人的富足；何況他們的豐滿呢？
11:13 我對你們外邦人說這話，因我是外邦人的使徒，所以敬重我的職分，
11:14 或者可以激動我骨肉之親發憤，可以救他們一些人。
11:15 若他們被丟棄，天下就得與神和好；他們被收納，豈不是死而復生嗎？
11:16 所獻的頭一塊麵若是聖潔，全團也就聖潔了；樹根若是聖潔，樹枝也就聖潔了。
11:17 若有幾根枝子被折下來，你這野橄欖得接在其中，一同得著橄欖根的肥汁，
11:18 你就不可向那些枝子誇口；若是誇口，當知道不是你托著根，乃是根托著你。
11:19 你若說：「那枝子被折下來，是特為讓我接上。」
11:20 不錯！他們因為不信，所以被折下來；你因為信，所以立得住。你不可自高，反要懼怕；
11:21 神既不愛惜原來的枝子，也必不愛惜你。
11:22 可見神的恩慈和嚴厲：向那跌倒的人是嚴厲的，向你是有恩慈的，只要你長久在他的恩慈裡；不然，你也要被砍下來。
11:23 而且他們若不是長久不信，仍要被接上；因為神能夠把他們重新接上。
11:24 你是從那天生的野橄欖上砍下來的，尚且逆著性得接在好橄欖上，何況這本樹的枝子，要接在本樹上呢！
11:25 弟兄們，我不願意你們不知道這奧祕（恐怕你們自以為聰明），就是以色列人有幾分是硬心的，等到外邦人的數目添滿了，
11:26 於是以色列全家都要得救。如經上所記：「必有一位救主從錫安出來，要消除雅各家的不虔不敬；
11:27 我除去他們罪的時候，這就是我與他們所立的約。」
11:28 就著福音說，他們為你們的緣故是仇敵；就著揀選說，他們為列祖的緣故是蒙愛的。
11:29 因為神的恩賜和選召是沒有後悔的。
11:30 你們從前不順從神，如今因他們的不順從，你們倒蒙了憐憫；
11:31 這樣，他們也是不順從，叫他們因著施給你們的憐憫，現在也就蒙憐憫。
11:32 因為神將眾人都圈在不順從之中，特意要憐憫眾人。
11:33 深哉，神豐富的智慧和知識！他的判斷何其難測！他的蹤跡何其難尋！
11:34 誰知道主的心？誰作過他的謀士呢？
11:35 誰是先給了他，使他後來償還呢？
11:36 因為萬有都是本於他，倚靠他，歸於他。願榮耀歸給他，直到永遠。阿們！`,

  '7/12': `12:1 所以弟兄們，我以神的慈悲勸你們，將身體獻上，當作活祭，是聖潔的，是神所喜悅的；你們如此事奉乃是理所當然的。
12:2 不要效法這個世界，只要心意更新而變化，叫你們察驗何為神的善良、純全、可喜悅的旨意。
12:3 我憑著所賜我的恩，對你們各人說：不要看自己過於所當看的，要照著神所分給各人信心的大小，看得合乎中道。
12:4 正如我們一個身子上有好些肢體，肢體也不都是一樣的用處。
12:5 我們這許多人，在基督裡成為一身，互相聯絡作肢體，也是如此。
12:6 按我們所得的恩賜，各有不同。或說預言，就當照著信心的程度說預言；
12:7 或作執事，就當專一執事；或作教導的，就當專一教導；
12:8 或作勸化的，就當專一勸化；施捨的，就當誠實；治理的，就當殷勤；憐憫人的，就當甘心。
12:9 愛人不可虛假，惡要厭惡，善要親近。
12:10 愛弟兄，要彼此親熱；恭敬人，要彼此推讓。
12:11 殷勤，不可懶惰；要心裡火熱，常常服事主。
12:12 在指望中要喜樂；在患難中要忍耐；禱告要恆切。
12:13 聖徒缺乏，要幫補；客要一味地款待。
12:14 逼迫你們的，要給他們祝福；只要祝福，不可咒詛。
12:15 與喜樂的人要同樂；與哀哭的人要同哭。
12:16 要彼此同心；不要志氣高大，倒要俯就卑微的人；不要自以為聰明。
12:17 不要以惡報惡；眾人以為美的事，要留心去做。
12:18 若是能行，總要盡力與眾人和睦。
12:19 親愛的弟兄，不要自己伸冤，寧可讓步，聽憑主怒；因為經上記著：「主說，伸冤在我，我必報應。」
12:20 所以，「你的仇敵若餓了，就給他吃；若渴了，就給他喝；因為你這樣行，就是把炭火堆在他的頭上。」
12:21 你不可為惡所勝，反要以善勝惡。`,

  '7/13': `13:1 在上有權柄的，人人當順服他，因為沒有權柄不是出於神的，凡掌權的都是神所命的。
13:2 所以，抗拒掌權的就是抗拒神的命；抗拒的必自取刑罰。
13:3 作官的原不是叫行善的懼怕，乃是叫作惡的懼怕。你願意不懼怕掌權的嗎？你只要行善，就可得他的稱讚；
13:4 因為他是神的用人，是與你有益的。你若作惡，卻當懼怕，因為他不是空空地佩劍；他是神的用人，是伸冤的，刑罰那作惡的人。
13:5 所以你們必須順服，不但是因為刑罰，也是因為良心。
13:6 你們納糧，也為這個緣故；因為他們是神的差役，常常特管這事。
13:7 凡人所當得的，就給他：當得糧的，給他納糧；當得稅的，給他上稅；當懼怕的，懼怕他；當恭敬的，恭敬他。
13:8 凡事都不可虧欠人，惟有彼此相愛，要常以為虧欠；因為愛人的就完全了律法。
13:9 像那「不可姦淫」、「不可殺人」、「不可偷盜」、「不可貪婪」，或有別的誡命，都包在「愛人如己」這一句話之內了。
13:10 愛是不加害於人的，所以愛就完全了律法。
13:11 況且你們曉得現今就是該趁早睡醒的時候；因為我們得救，現今比初信的時候更近了。
13:12 黑夜已深，白晝將近；我們就當脫去暗昧的行為，帶上光明的兵器。
13:13 行事要端正，好像行在白晝；不可荒宴醉酒；不可好色邪蕩；不可爭競嫉妒。
13:14 總要披戴主耶穌基督，不要為肉體安排，去放縱私慾。`,

  '7/14': `14:1 信心軟弱的，你們要接納，但不要辯論所疑惑的事。
14:2 有人信百物都可吃；但那軟弱的，只吃蔬菜。
14:3 吃的人不可輕看不吃的人；不吃的人不可論斷吃的人；因為神已經收納他了。
14:4 你是誰，竟論斷別人的僕人呢？他或站住，或跌倒，自有他的主人在；而且他也必要站住，因為主能使他站住。
14:5 有人看這日比那日強；有人看日日都是一樣，只是各人心裡要有定見。
14:6 守日的人是為主守的；吃的人是為主吃的，因他感謝神；不吃的人是為主不吃的，也感謝神。
14:7 我們沒有一個人為自己活，也沒有一個人為自己死；
14:8 我們若活著，是為主而活；若死了，是為主而死。所以我們或活或死，總是主的人。
14:9 因此，基督死了，又活了，為要作死人並活人的主。
14:10 你這個人，為甚麼論斷弟兄呢？又為甚麼輕看弟兄呢？因為我們都要站在神的台前。
14:11 經上寫著：「主說，我憑著我的永生起誓：萬膝必向我跪拜；萬口必向我承認。」
14:12 這樣看來，我們各人必要將自己的事在神面前說明。
14:13 所以，我們不可再彼此論斷，寧可定意，誰也不給弟兄放下絆腳跌人之物。
14:14 我憑著主耶穌確知深信，凡物本來沒有不潔淨的；惟獨人以為不潔淨的，在他就不潔淨了。
14:15 你若因食物叫弟兄憂愁，就不是按著愛人的道理行。基督已經替他死了，你不可因你的食物叫他敗壞。
14:16 不可叫你的善被人毀謗；
14:17 因為神的國不在乎吃喝，只在乎公義、和平，並聖靈中的喜樂。
14:18 在這幾件事上服事基督的，就為神所喜悅，又為人所稱許。
14:19 所以，我們務要追求和睦的事與彼此建立德行的事。
14:20 不可因飲食毀壞神的工程。凡物固然潔淨，但有人因食物叫人跌倒，就是他的罪了。
14:21 無論是吃肉，是喝酒，是什麼別的事，叫弟兄跌倒，一概不做才好。
14:22 你有信心，就當在神面前守著。人在自己以為可行的事上能不自責，就有福了。
14:23 若有疑心而吃的，就必有罪，因為他吃不是出於信心；凡不出於信心的事都是罪。`,

  '7/15': `15:1 我們堅固的人應該擔代不堅固人的軟弱，不求自己的喜悅。
15:2 我們各人務要叫鄰舍喜悅，使他得益處，建立德行。
15:3 因為基督也不求自己的喜悅，如經上所記：「那些辱罵你人的辱罵都落在我身上了。」
15:4 從前所寫的聖經，都是為教訓我們寫的，叫我們因聖經所生的忍耐和安慰，可以得著盼望。
15:5 但願賜忍耐、安慰的神叫你們彼此同心，效法基督耶穌，
15:6 一心一口，榮耀神我們主耶穌基督的父。
15:7 所以你們要彼此接納，如同基督接納你們一樣，使榮耀歸與神。
15:8 我說，基督是為神真理作了受割禮人的執事，要證實所應許列祖的話，
15:9 並叫外邦人因他的憐憫，榮耀神。如經上所記：「因此，我要在外邦中稱謝你，歌頌你的名。」
15:10 又說：「你們外邦人當與主的百姓一同歡樂。」
15:11 又說：「你們外邦人當讚美主；萬民哪，當頌讚他。」
15:12 又有以賽亞說：「將來有耶西的根，就是那興起來治理外邦的；外邦人要仰望他。」
15:13 但願盼望的神，因信將諸般的喜樂、平安充滿你們的心，使你們藉著聖靈的能力大有盼望。
15:14 弟兄們，我自己也深信你們是滿有良善，充足了諸般的知識，也能彼此勸戒。
15:15 然而我寫信給你們，在幾件事上稍微放膽提醒你們，是因為神給我的恩典，
15:16 使我為外邦人作基督耶穌的執事，作神福音的祭司，叫所獻的外邦人，被聖靈成聖，可以稱為全然可獻的祭。
15:17 所以，我在基督耶穌裡，在神的事上，是可以誇口的。
15:18 除了基督藉我做的那些事，我甚麼都不敢提，只提他藉我言語作為，用神蹟奇事的能力，並聖靈的能力，使外邦人順服，
15:19 以至我從耶路撒冷，直轉到以利哩古，到處傳遍了基督的福音。
15:20 我立了志向，不在基督的名被稱過的地方傳福音，免得建造在別人的根基上，
15:21 卻如經上所記：「未曾聞知他信息的，將要看見；未曾聽過的，將要明白。」
15:22 我因多次被攔阻，總不得到你們那裡去。
15:23 但如今，在這一帶地方，再沒有可傳福音的地方，而且這好幾年，我切心渴望到西班牙去的時候，可以到你們那裡，
15:24 盼望從你們那裡經過，得見你們，先與你們彼此交往，心裡稍微滿足，然後蒙你們送行。
15:25 但現在，我往耶路撒冷去，供應聖徒。
15:26 因為馬其頓和亞該亞人樂意湊出捐項，給耶路撒冷聖徒中的窮人。
15:27 這固然是他們樂意的，其實也算是所欠的債；因外邦人既然分享了他們屬靈的好處，就當把養身之物供給他們。
15:28 等我辦完了這事，把這捐項當面交給他們，我就要路過你們那裡，往西班牙去。
15:29 我也曉得我到你們那裡，是帶著基督豐盛的福氣來的。
15:30 弟兄們，我藉著我們主耶穌基督，又藉著聖靈的愛，勸你們與我一同竭力，為我向神祈求，
15:31 叫我脫離在猶太不順從的人，也叫我為耶路撒冷所辦的供給，能悅納聖徒；
15:32 並叫我順著神的旨意到你們那裡，與你們同得快樂，一同得著安息。
15:33 但願賜平安的神與你們眾人同在。阿們！`,

  '7/16': `16:1 我對你們舉薦我們的姐妹非比，她是堅革哩教會中的女執事，
16:2 請你們為主接待她，合乎聖徒的體統，她在那裡辦理了許多事，我也是其中的一個，你們有甚麼事需要她幫助，就幫助她。
16:3 問百基拉和亞居拉安，他們是在基督耶穌裡與我同工的，
16:4 也是為我的命捨己頸項的；不但我感謝他們，就是外邦的眾教會也感謝他們。
16:5 又問在他們家中的教會安。問我所親愛的以拜尼土安，他在亞細亞是歸基督初結的果子。
16:6 問馬利亞安，她為你們多受勞苦。
16:7 問我的親屬安多尼古和猶尼亞安，他們曾與我一同坐監；他們在使徒中是有名望的，也是比我先在基督裡的。
16:8 問我在主裡所親愛的暗百里安。
16:9 問在基督裡與我們同工的烏巴奴，並我所親愛的士大古安。
16:10 問那在基督裡經過試驗的亞比利安；問亞利多布家中的人安。
16:11 問我親屬希羅天安；問拿其數家中在主裡的人安。
16:12 問特呂非拿和特呂鳳安，她們在主裡勞苦；問我所親愛的彼息，她為主多受勞苦。
16:13 問在主裡所揀選的魯孚和他母親安，他的母親就是我的母親。
16:14 問亞新革力、弗勒公、黑米、八羅拔、黑馬，並和他們在一處的弟兄們安。
16:15 問腓羅羅哥和猶利亞，尼利亞和他的姐妹，又問阿林巴，並和他們在一處的眾聖徒安。
16:16 你們要親嘴問安，彼此務要聖潔。基督的眾教會都問你們安。
16:17 弟兄們，那些離間你們、叫你們跌倒，背乎所學之道的人，我勸你們要留意躲避他們；
16:18 因為這樣的人不服事我們的主基督，只服事自己的肚腹，用花言巧語誘惑那老實人的心。
16:19 你們的順從傳遍了天下，所以我為你們歡喜；但我願意你們在善上聰明，在惡上純樸。
16:20 賜平安的神快要將撒但踐踏在你們腳下。願我主耶穌基督的恩常和你們同在。
16:21 與我同工的提摩太，並我的親屬路求、耶孫、索西巴德問你們安。
16:22 我這代保羅寫信的德丟在主裡問你們安。
16:23 那款待我、也款待眾教會的該猶問你們安。城裡的管錢財的以拉都，並兄弟括土問你們安。
16:24 〔願我主耶穌基督的恩常和你們眾人同在！阿們！〕
16:25 惟有神能照我所傳的福音和所講的耶穌基督，並照永古隱藏不言的奧祕，堅固你們的心。
16:26 但如今這奧祕顯明出來，而且按著永生神的命，藉眾先知的書指示萬國的民，叫他們信服真道。
16:27 願榮耀因耶穌基督，歸於獨一全智的神，直到永遠。阿們！`,

  '7/17': `1:1 作使徒的保羅（不是由於人，也不是藉著人，乃是藉著耶穌基督，與叫他從死裡復活的父神），
1:2 並同我一切弟兄們，寫信給加拉太的各教會。
1:3 願恩惠、平安從父神並我們的主耶穌基督歸於你們。
1:4 基督照我們父神的旨意，為我們的罪捨己，要救我們脫離這罪惡的世代。
1:5 但願榮耀歸於神，直到永永遠遠。阿們！
1:6 我希奇你們這麼快離開那藉著基督之恩召你們的，去從別的福音。
1:7 那並不是福音，不過有些人攪擾你們，要把基督的福音更改了。
1:8 但無論是我們，是天上來的使者，若傳福音給你們，與我們所傳給你們的不同，他就應當被咒詛。
1:9 我們以前說過，我現在又說，若有人傳福音給你們，與你們所領受的不同，他就應當被咒詛。
1:10 我現在是要得人的心呢？還是要得神的心呢？我豈是討人的喜歡嗎？若仍舊討人的喜歡，我就不是基督的僕人了。
1:11 弟兄們，我告訴你們，我素來所傳的福音，不是出於人的意思，
1:12 因為我不是從人領受的，也不是人教導我的，乃是從耶穌基督啟示來的。
1:13 我從前在猶太教中所行的事，你們都聽見了，我極力逼迫神的教會，殘害了它；
1:14 我在猶太教中比我本國許多同歲的人更有長進，為我祖宗的遺傳更加熱心。
1:15 然而，那把我從母腹裡分別出來、又施恩召我的神，
1:16 既然樂意將他兒子啟示在我心裡，叫我把他傳在外邦人中，我就沒有與血氣的人商量，
1:17 也沒有上耶路撒冷去見那些比我先作使徒的，惟獨往亞拉伯去，後來回到大馬色。
1:18 過了三年，我才上耶路撒冷去見磯法，和他同住了十五天。
1:19 至於別的使徒，除了主的兄弟雅各，我都沒有看見。
1:20 我寫給你們的，不是謊話，這是我在神面前說的。
1:21 以後我到了敘利亞和基利家境內，
1:22 那時猶太各教會在基督裡的人，還沒有見過我的面，
1:23 不過聽說那從前逼迫我們的，現在傳揚他從前所殘害的那信仰，
1:24 他們就為我的事將榮耀歸於神。`,

  '7/18': `2:1 過了十四年，我同巴拿巴又上耶路撒冷去，並帶著提多同去。
2:2 我是奉啟示上去的，把我在外邦人中所傳的福音，私下陳明給那有名望的人，惟恐我現在或是從前徒然奔跑。
2:3 但與我同去的提多，雖是希臘人，也沒有被強迫受割禮。
2:4 因為有偷著引進來的假弟兄，私下窺探我們在基督耶穌裡的自由，要叫我們作奴僕；
2:5 我們就是一刻的工夫也沒有容讓順從他們，為要叫福音的真理仍存在你們中間。
2:6 至於那些有名望的，不管他們從前是怎樣的人，我都無所謂，神不以外貌取人——那些有名望的，並沒有加添我甚麼。
2:7 反之，他們看見了我奉託傳福音給那未受割禮的人，正如彼得奉託傳福音給那受割禮的人；
2:8 （因為那感動彼得去作受割禮之人使徒的，也感動我去作外邦人的使徒）；
2:9 又知道我所得的恩典，那稱為柱石的雅各、磯法、約翰，就向我和巴拿巴用右手行相交之禮，叫我們往外邦人那裡去，他們往受割禮的人那裡去。
2:10 只是願意我們記念窮人；這也是我本來熱心去行的。
2:11 後來磯法到了安提阿，因為有該責備的地方，我就當面抵擋他。
2:12 因為他來以先，曾和外邦人一同吃飯；及至他們來到，他因怕奉割禮的人，就退去與外邦人隔開了。
2:13 其餘的猶太人也都隨著他裝假，甚至巴拿巴也隨夥裝假。
2:14 但我一看見他們行得不正，不是按著福音的真理，就在眾人面前對磯法說：你既是猶太人，卻按外邦人的規矩而行，不按猶太人的規矩，你怎麼還勉強外邦人隨從猶太人呢？
2:15 我們這生來是猶太人，不是外邦罪人；
2:16 既知道人稱義不是因行律法，乃是因信耶穌基督，連我們也信了基督耶穌，使我們因信基督稱義，不因行律法稱義；因為凡有血氣的，沒有一人因行律法稱義。
2:17 我們若求在基督裡稱義，卻仍舊是罪人，難道基督是叫人犯罪的嗎？斷乎不是！
2:18 我素來所拆毀的，若重新建造，這就證明自己是犯罪的人。
2:19 我因律法，就向律法死了，叫我可以向神活著。
2:20 我已經與基督同釘十字架，現在活著的不再是我，乃是基督在我裡面活著；並且我如今在肉身活著，是因信神的兒子而活，他是愛我，為我捨己。
2:21 我不廢掉神的恩；義若是藉著律法得的，基督就是徒然死了。`,

  '7/19': `3:1 無知的加拉太人哪，耶穌基督釘十字架，已經活畫在你們眼前，誰又迷惑了你們呢？
3:2 我只要問你們這一件：你們受了聖靈，是因行律法呢？是因聽信福音呢？
3:3 你們既靠聖靈入門，如今還靠肉體成全嗎？你們是這樣無知嗎？
3:4 你們受苦如此之多，都是徒然的嗎？難道果真是徒然的嗎？
3:5 那賜給你們聖靈，又在你們中間行異能的，是因你們行律法呢？是因你們聽信福音呢？
3:6 正如「亞伯拉罕信神，這就算為他的義。」
3:7 所以，你們要知道那以信為本的人，就是亞伯拉罕的子孫。
3:8 並且聖經既然預先看明，神要叫外邦人因信稱義，就早已傳福音給亞伯拉罕，說：「萬國都必因你得福。」
3:9 可見那以信為本的人，和有信心的亞伯拉罕一同得福。
3:10 凡以行律法為本的，都是被咒詛的；因為經上記著：「凡不常照律法書上所記一切之事去行的，就被咒詛。」
3:11 沒有一個人靠著律法在神面前稱義，這是明顯的；因為「義人必因信得生。」
3:12 律法原不本乎信，只說：「行這些事的，就必因此活著。」
3:13 基督既為我們受了咒詛，就贖出我們脫離律法的咒詛；因為經上記著：「凡掛在木頭上都是被咒詛的。」
3:14 這便叫亞伯拉罕的福，因基督耶穌可以臨到外邦人，使我們因信得著所應許的聖靈。
3:15 弟兄們，我且照著人的常話說，雖然是人的文約，若已經立定了，就沒有能廢棄或加增的。
3:16 所應許的話是對亞伯拉罕和他子孫說的。神並不是說眾子孫，指著許多人，乃是說你那一個子孫，指著一個人，就是基督。
3:17 我是這樣說，神預先所立的約，不能被那四百三十年以後的律法廢掉，叫應許歸於虛空。
3:18 因為承受產業，若是出於律法，就不是出於應許；但神是憑著應許，把產業賜給亞伯拉罕。
3:19 這樣，律法是為甚麼有的呢？律法本是為過犯添上的，等候那蒙應許的子孫來到，並且是藉天使經中保之手設立的。
3:20 中保本不是為一方設立的；神卻是一位。
3:21 這樣，律法是與神的應許相抵背嗎？斷乎不是！若是所賜的律法能叫人得生，義就誠然本乎律法了。
3:22 但聖經把眾人都圈在罪裡，使所應許的福，因信耶穌基督，歸給那信的人。
3:23 但這因信得救的理，還沒有來以先，我們被看守在律法之下，直圈到那將來的真道顯明出來。
3:24 這樣，律法是我們訓蒙的師傅，引我們到基督那裡，使我們因信稱義。
3:25 但這因信得救的理既然來到，我們從此就不在師傅的手下了。
3:26 所以，你們因信基督耶穌，都是神的兒子。
3:27 你們受洗歸入基督的，都是披戴基督了。
3:28 並不分猶太人、希臘人，自主的、為奴的，或男或女，因為你們在基督耶穌裡都成為一了。
3:29 你們既屬乎基督，就是亞伯拉罕的後裔，是照著應許承受產業的了。`,

  '7/20': `4:1 我說那承受產業的，雖然是全業的主人，但為孩童的時候，卻與奴僕毫無分別，
4:2 乃在師傅和管家的手下，直等他父親預定的時候來到。
4:3 我們為孩童的時候，受管於世俗小學之下，也是如此。
4:4 及至時候滿足，神就差遣他的兒子，為女子所生，且生在律法以下，
4:5 要把律法以下的人贖出來，叫我們得著兒子的名分。
4:6 你們既為兒子，神就差他兒子的靈進入你們的心，呼叫：「阿爸！父！」
4:7 可見，從此以後，你不是奴僕，乃是兒子了；既是兒子，就靠著神為後嗣。
4:8 但從前你們不認識神，那時是給那些本來不是神的作奴僕。
4:9 現在你們既然認識神，更可說是被神所認識的，怎麼還要歸回那懦弱無用的小學，情願再給它作奴僕呢？
4:10 你們謹守日子、月份、節期、年份，
4:11 我為你們害怕，惟恐我在你們身上是枉費了工夫。
4:12 弟兄們，我勸你們要像我一樣；因為我也像你們一樣。你們一點沒有虧負我。
4:13 你們知道我頭一次傳福音給你們，是因為身體有疾病，
4:14 你們因我身體的緣故受試煉，沒有輕看我，也沒有厭棄我，反倒接待我，如同神的使者，如同基督耶穌。
4:15 那麼，你們當時所稱讚自己的福氣在哪裡呢？那時你們若能行，就是把自己的眼睛剜出來給我，也都情願；我可以給你們作見證。
4:16 如此，難道我因為向你們說真話，就成了你們的仇敵嗎？
4:17 那些人熱心待你們，卻不是好意，是要離間你們，叫你們熱心待他們。
4:18 在善事上，常常有人熱心待你們，原是好的，不獨我在你們那裡的時候才這樣（這卻是好的）。
4:19 我小子啊，我為你們再受生產之苦，直等到基督成形在你們心裡。
4:20 我巴不得現今在你們那裡，改換口氣，因為我為你們心裡作難。
4:21 你們這願意在律法以下的人，請告訴我，你們沒有聽見律法嗎？
4:22 因為律法上記著，亞伯拉罕有兩個兒子，一個是使女生的，一個是自主婦人生的。
4:23 然而，那使女所生的，是按著血氣生的；那自主婦人所生的，是憑著應許生的。
4:24 這都是比方，那兩個婦人，就是兩約；一約是出於西乃山，生子為奴，乃是夏甲。
4:25 這夏甲二字，是指著阿拉伯的西乃山，與現在的耶路撒冷同類，耶路撒冷和她的兒女都是為奴的。
4:26 但那在上的耶路撒冷是自主的，她是我們的母。
4:27 因為經上記著：「你這未曾生育的，當歡樂；你這未曾經過生產之苦的，當喊叫歡呼；因為沒有丈夫的，比有丈夫的兒女更多。」
4:28 弟兄們，我們是憑著應許作兒女，如同以撒一樣。
4:29 當時那按著血氣生的，逼迫了那按著聖靈生的，現在也是這樣。
4:30 然而經上是怎麼說的呢？「把使女和她兒子趕出去，因為使女的兒子，不可與自主婦人的兒子一同承受產業。」
4:31 弟兄們，這樣看來，我們不是使女的兒女，乃是自主婦人的兒女了。`,

  '7/21': `5:1 基督釋放了我們，叫我們得以自由，所以要站立得穩，不要再被奴僕的軛挾制。
5:2 我保羅告訴你們，若受割禮，基督就與你們無益了。
5:3 我再指著凡受割禮的人確實地說，他是欠著行全律法的債。
5:4 你們這要靠律法稱義的，是與基督隔絕，從恩典中墜落了。
5:5 我們靠著聖靈，憑著信心，等候所盼望的義。
5:6 原來在基督耶穌裡，受割禮不受割禮全無功效，惟獨使人生發仁愛的信心才有功效。
5:7 你們向來跑得好，有誰攔阻你們，叫你們不順從真理呢？
5:8 這樣的慫恿，不是出於那召你們的。
5:9 一點麵酵能使全團都發起來。
5:10 我在主裡很信你們不存別樣的心，但那攪擾你們的，無論是誰，必擔當他當受的判斷。
5:11 弟兄們，我若仍舊傳割禮，為甚麼還受逼迫呢？若是這樣，那十字架討厭人的地方就沒有了。
5:12 恨不得那些攪擾你們的人，把自己割絕了。
5:13 弟兄們，你們蒙召，是要得自由；只是不可將你們的自由當作放縱情慾的機會，總要用愛心互相服事。
5:14 因為全律法都包在「愛人如己」這一句話之內了。
5:15 你們要謹慎，若相咬相吞，只怕要彼此消滅了。
5:16 我說，你們當順著聖靈而行，就不放縱肉體的情慾了。
5:17 因為情慾和聖靈相爭，聖靈和情慾相爭，這兩個是彼此相敵，使你們不能做所願意做的事。
5:18 但你們若被聖靈引導，就不在律法以下。
5:19 情慾的事，都是顯而易見的，就如姦淫、污穢、邪蕩、
5:20 拜偶像、邪術、仇恨、爭競、忌恨、惱怒、結黨、紛爭、異端、
5:21 嫉妒、醉酒、荒宴等類；我從前告訴你們，現在又告訴你們，行這樣事的人必不能承受神的國。
5:22 聖靈所結的果子，就是仁愛、喜樂、和平、忍耐、恩慈、良善、信實、
5:23 溫柔、節制；這樣的事，沒有律法禁止。
5:24 凡屬基督耶穌的人，是已經把肉體連肉體的邪情私慾，同釘在十字架上了。
5:25 我們若是靠聖靈得生，就當靠聖靈行事。
5:26 不要貪圖虛名，彼此惹氣，互相嫉妒。`,

  '7/22': `6:1 弟兄們，若有人偶然被過犯所勝，你們屬靈的人，就當用溫柔的心把他挽回過來；又當自己小心，恐怕也被引誘。
6:2 你們各人的重擔要互相擔當，如此，就完全了基督的律法。
6:3 人若無有，自己還以為有，就是自欺了。
6:4 各人應當察驗自己的行為，這樣，他所誇的就專在自己，不在別人了；
6:5 因為各人必擔當自己的擔子。
6:6 在道理上受教的，當把一切需用的供給施教的人。
6:7 不要自欺，神是輕慢不得的，人種的是甚麼，收的也是甚麼。
6:8 順著情慾撒種的，必從情慾收敗壞；順著聖靈撒種的，必從聖靈收永生。
6:9 我們行善，不可喪志；若不灰心，到了時候就要收成。
6:10 所以，有了機會，就當向眾人行善，向信徒一家的人更當這樣。
6:11 請看我親手寫給你們的字，是何等的大呢。
6:12 凡希圖在外貌上體面的人，都要勉強你們受割禮，無非是怕自己為基督的十字架受逼迫。
6:13 就是那些受割禮的，自己也不守律法；他們願意你們受割禮，不過是要藉著你們的肉體誇口。
6:14 但我斷不以別的誇口，只誇我們主耶穌基督的十字架；因這十字架，就我而論，世界已經釘在十字架上了；就世界而論，我已經釘在十字架上了。
6:15 受割禮不受割禮都無關緊要，要緊的就是作新造的人。
6:16 凡照此理而行的，願平安、憐憫加給他們，和神的以色列民。
6:17 從今以後，人都不要攪擾我，因為我身上帶著耶穌的印記。
6:18 弟兄們，願我們主耶穌基督的恩常在你們心裡。阿們！`,

  '7/23': `1:1 奉神旨意，作基督耶穌使徒的保羅，並兄弟提摩太，
1:2 寫信給歌羅西的聖徒，並在基督裡有忠心的弟兄。願恩惠、平安從神我們的父歸與你們！
1:3 我們感謝神，我們主耶穌基督的父，常常為你們禱告。
1:4 因為聽見你們在基督耶穌裡的信心，並你們愛一切聖徒的心；
1:5 是為那給你們存在天上的盼望；這盼望就是你們從前在福音真理的道上所聽見的。
1:6 這福音傳到你們那裡，也傳到普天之下，並且結果，增長，如同在你們中間，自從你們聽見福音，真知道神恩典的那天也是這樣。
1:7 正如你們從我們所親愛、一同作僕人的以巴弗所學的，他也為我們作了基督忠心的執事；
1:8 他把你們在聖靈裡的愛，告訴了我們。
1:9 因此，我們自從聽見的那日，也就為你們不住地禱告祈求，願你們在一切屬靈的智慧悟性上，滿心知道神的旨意；
1:10 好叫你們行事為人對得起主，凡事蒙他喜悅，在一切善事上結果子，漸漸地多知道神；
1:11 照他榮耀的權能，得以剛強，凡事歡歡喜喜地忍耐寬容；
1:12 又感謝父，他叫我們能與眾聖徒在光明中同得基業；
1:13 他救了我們脫離黑暗的權勢，把我們遷到他愛子的國裡；
1:14 我們在愛子裡得蒙救贖，罪過得以赦免。
1:15 愛子是那不能看見之神的像，是首生的，在一切被造的以先；
1:16 因為萬有都是靠他造的，無論是天上的，地上的，能看見的，不能看見的，或是有位的，主治的，執政的，掌權的，一概都是藉著他造的，又是為他造的。
1:17 他在萬有之先；萬有也靠他而立。
1:18 他也是教會全體之首。他是元始，是從死裡首先復生的，使他可以在凡事上居首位。
1:19 因為父喜歡叫一切的豐盛，在他裡面居住；
1:20 既然藉著他在十字架上所流的血，成就了和平，便藉著他叫萬有，無論是地上的、天上的，都與自己和好了。
1:21 你們從前與神隔絕，因著惡行，心裡與他為敵；
1:22 但如今他藉著基督的肉身受死，叫你們與自己和好，都成了聖潔，沒有瑕疵，無可責備，把你們引到自己面前。
1:23 只要你們在所信的道上恆心，根基穩固，堅定不移，不至被引動失去福音的盼望；這福音就是你們所聽過的，也是傳遍天下萬人聽見的，我保羅也作了這福音的執事。
1:24 現在我為你們受苦，倒覺歡樂；並且為基督的身體，就是為教會，要在我肉身上補滿基督患難的缺欠。
1:25 我照神為你們所賜我的職分，作了教會的執事，要把神的道理傳得全備，
1:26 這道理，就是歷世歷代所隱藏的奧祕，但如今向他的聖徒顯明了，
1:27 神願意叫他們知道，這奧祕在外邦人中有何等豐盛的榮耀，就是基督在你們心裡成了有榮耀的盼望。
1:28 我們傳揚他，是用諸般的智慧，勸戒各人，教導各人，要把各人在基督裡完完全全地引到神面前；
1:29 我也為此勞苦，照著他在我裡面運用的大能盡力而為。`,

  '7/24': `2:1 我願意你們曉得，我為你們和老底嘉人，並一切沒有親眼見過我面的人，是何等地盡心竭力，
2:2 要叫他們的心得安慰，因愛心互相聯絡，以致豐豐足足在悟性中有充足的信心，使他們真知道神的奧祕，就是基督；
2:3 所積蓄的一切智慧知識，都在他裡面藏著。
2:4 我說這話，是要使你們沒有人用花言巧語迷惑你們。
2:5 我身子雖與你們相離，心卻與你們同在，見你們規規矩矩，信主基督的心也堅固，我就歡喜了。
2:6 你們既然接受了主基督耶穌，就當遵他而行，
2:7 在他裡面生根建造，信心堅固，正如你們所領的教訓，感謝的心也更增益了。
2:8 你們要謹慎，恐怕有人用他的理學和虛空的妄言，不照著基督，乃照著人間的遺傳和世上的小學，就把你們擄去。
2:9 因為神本性一切的豐盛，都有形有體地居住在基督裡面；
2:10 你們在他裡面也得了豐盛，他是各樣執政掌權者的元首。
2:11 你們在他裡面，也受了不是人手所行的割禮，乃是基督使你們脫去肉體情慾的割禮。
2:12 你們既受洗與他一同埋葬，也就在此與他一同復活，都因信那叫他從死裡復活神的功用。
2:13 你們從前在過犯和未受割禮的肉體中死了，神赦免了你們（我們）一切過犯，便叫你們與基督一同活過來；
2:14 又塗抹了在律例上所寫攻擊我們、有礙於我們的字據，把它撤去，釘在十字架上；
2:15 既將一切執政的、掌權的，擄來示眾，藉著十字架誇勝他們。
2:16 所以，不拘在飲食上，或節期、月朔、安息日，都不可讓人論斷你們；
2:17 這些原是後事的影兒，那形體卻是基督。
2:18 不可讓人因著故意謙虛和敬拜天使，就奪去你們的獎賞；這等人因著所見過的加以詳述，隨著自己肉體的心思無故自高自大，
2:19 不持定元首；全身既然靠著他，藉著各節各筋得以相助聯絡，就因神大得長進。
2:20 你們若是與基督同死，脫離了世上的小學，為甚麼仍像在世俗中活著，服從那「不可拿、不可嘗、不可摸」等類的規條呢？
2:21 這都是照人所吩咐、所教導的，說這些規條乃是在用的時候就消滅的，
2:22 有崇拜的外貌，並假意謙遜，苦待己身，其實在克制肉體的情慾上是毫無功效。`,

  '7/25': `3:1 所以，你們若真與基督一同復活，就當求在上面的事；那裡有基督坐在神的右邊。
3:2 你們要思念那上面的事，不要思念地上的事；
3:3 因為你們已經死了，你們的生命與基督一同藏在神裡面。
3:4 基督是我們的生命，他顯現的時候，你們也要與他一同顯現在榮耀裡。
3:5 所以，要治死你們在地上的肢體，就如淫亂、污穢、邪情、惡慾，和貪婪（貪婪就與拜偶像一樣）。
3:6 因為這些事，神的忿怒必臨到那悖逆之子；
3:7 你們從前在這些事中活著的時候，也曾這樣行過。
3:8 但現在你們要棄絕這一切的事：惱恨、忿怒、惡毒、毀謗，並口中污穢的言語。
3:9 不要彼此說謊；因為你們已經脫去舊人和舊人的行為，
3:10 穿上了新人，這新人在知識上漸漸更新，正如造他主的形像。
3:11 在此並不分希臘人、猶太人，受割禮的、未受割禮的，化外人、西古提人，為奴的、自主的，惟有基督是包括一切，又住在各人之內。
3:12 所以，你們既是神的選民，聖潔蒙愛的人，就要存憐憫、恩慈、謙虛、溫柔、忍耐的心。
3:13 倘若這人與那人有嫌隙，總要彼此包容，彼此饒恕；主怎樣饒恕了你們，你們也要怎樣饒恕人。
3:14 在這一切之外，要存著愛心，愛心就是聯絡全德的。
3:15 又要叫基督的平安在你們心裡作主；你們也為此蒙召，歸為一體；且要存感謝的心。
3:16 當用各樣的智慧，把基督的道理豐豐富富地存在心裡，（或譯：當把基督的話豐豐富富地存在心裡，以各樣智慧）用詩章、頌詞、靈歌彼此教導，互相勸戒，心被恩感，歌頌神。
3:17 無論做甚麼，或說話，或行事，都要奉主耶穌的名，藉著他感謝父神。
3:18 你們作妻子的，當順服自己的丈夫，這在主裡面是相宜的。
3:19 你們作丈夫的，要愛你們的妻子，不可苦待她們。
3:20 你們作兒女的，要凡事聽從父母，因為這是主所喜悅的。
3:21 你們作父親的，不要惹兒女的氣，恐怕他們失了志氣。
3:22 你們作僕人的，要凡事聽從你們肉身的主人，不要只在眼前事奉，像是討人喜歡的，總要存心誠實敬畏主。
3:23 無論做甚麼，都要從心裡做，像是給主做的，不是給人做的；
3:24 因為你們知道，從主那裡必得著基業為賞賜，你們所事奉的乃是主基督。
3:25 那行不義的，必受不義的報應；主並不偏待人。`,

  '7/26': `4:1 你們作主人的，要公公平平地待僕人，因為你們知道，你們也有一位主在天上。
4:2 你們要恆切禱告，在此儆醒感恩。
4:3 也要為我們禱告，求神給我們開傳道的門，能以講說基督的奧祕（我為此被捆鎖），
4:4 叫我按著所該說的將這奧祕發明出來。
4:5 你們要愛惜光陰，用智慧與外人交往，
4:6 你們的言語要常常帶著和氣，好像用鹽調和，就可知道該怎樣回答各人。
4:7 有我親愛的兄弟推基古，他是忠心的執事，也是在主裡與我同作僕人的，他要把我一切的事都告訴你們；
4:8 我特意打發他到你們那裡去，好叫你們知道我們的光景，也叫他安慰你們的心。
4:9 我又打發和推基古同去的，有出於你們本地忠心親愛的兄弟阿尼西謀，他們要把這裡一切的事都告訴你們。
4:10 與我一同坐監的亞里達古問你們安，巴拿巴的表弟馬可也問你們安（說到這馬可，你們已經受了吩咐，他若到了你們那裡，你們要接待他）；
4:11 也有稱為猶士都的耶數問你們安；在奉割禮的人中，只有這三個人是為神的國與我一同做工的，也是叫我心裡得安慰的。
4:12 有你們那裡的人，作基督耶穌僕人的以巴弗，問你們安；他在禱告之間，常為你們竭力地祈求，願你們在神一切旨意上，得以完全，信心充足，確實站立。
4:13 他為你們和老底嘉、並希拉波立的弟兄們多多地勞苦，這是我可以給他作見證的。
4:14 所親愛的醫生路加和底馬問你們安。
4:15 請問老底嘉的弟兄們，並寧法和他家裡的教會安。
4:16 你們把這書信念了，也要叫老底嘉的教會念，你們也要念從老底嘉來的書信。
4:17 要告訴亞基布，務要謹慎，盡你從主所受的職事。
4:18 我保羅親筆問你們安。你們要記念我的捆鎖。願恩惠與你們同在！`,

  '7/27': `1:1 基督耶穌的僕人保羅和提摩太，寫信給凡住腓立比、在基督耶穌裡的眾聖徒，並諸位監督、諸位執事。
1:2 願恩惠、平安從神我們的父並主耶穌基督歸與你們！
1:3 我每逢想念你們，就感謝我的神；
1:4 每逢為你們眾人祈求的時候，常是歡歡喜喜地祈求。
1:5 因為從頭一天直到如今，你們是同心合意地興旺福音。
1:6 我深信那在你們心裡動了善工的，必成全這工，直到耶穌基督的日子。
1:7 我為你們眾人有這樣的意念，原是應當的；因為我把你們放在心裡，無論我是在捆鎖之中，是辯明證實福音的時候，你們大家都與我一同得恩。
1:8 我體會基督耶穌的心腸，切切地想念你們眾人，這是神可以給我作見證的。
1:9 我所禱告的，就是要你們的愛心，在知識和各樣見識上，多而又多，
1:10 使你們能分別是非，作誠實無過的人，直到基督的日子，
1:11 並靠著耶穌基督結滿了仁義的果子，叫榮耀稱讚歸與神。
1:12 弟兄們，我願意你們知道，我所遭遇的事，更是叫福音興旺，
1:13 以致我受的捆鎖，在御營全軍和其餘的人中，已經顯明是為基督的緣故。
1:14 並且那在主裡的弟兄，多半因我受的捆鎖，就篤信不疑，越發放膽傳神的道，無所懼怕。
1:15 有些人傳基督，是出於嫉妒分爭；也有些人傳基督，是出於好意。
1:16 這一等人傳基督，是出於愛心，知道我是為辯明福音設立的；
1:17 那一等人傳基督，是出於結黨，並不誠實，意思要加增我捆鎖的苦楚。
1:18 這有何妨呢？或是假意，或是真心，無論怎樣，基督究竟被傳開了，為此我就歡喜，並且還要歡喜；
1:19 因為我知道，這事藉著你們的祈禱，和耶穌基督之靈的幫助，終必叫我得救。
1:20 照著我所切慕、所盼望的，沒有一事叫我羞愧，只要凡事放膽，無論是生是死，總叫基督在我身上照常顯大；
1:21 因我活著就是基督，我死了就有益處。
1:22 但我在肉身活著，若成就我工夫的果子，我就不知道該挑選甚麼。
1:23 我正在兩難之間，情願離世與基督同在，因為這是好得無比的；
1:24 然而，我在肉身活著，為你們更是要緊的。
1:25 我既然這樣確信，我知道仍要住在世間，且與你們眾人同住，使你們在所信的道上，並喜樂上，都可以長進；
1:26 叫你們在基督耶穌裡，因我再到你們那裡，就越發有所誇口。
1:27 只要你們行事為人與基督的福音相稱，叫我或來見你們，或不在你們那裡，可以聽見你們的風聲，知道你們同有一個心志，站立得穩，為所信的福音齊心努力。
1:28 凡事不怕敵人的驚嚇，這就是他們沉淪、你們得救的明證，都是出於神。
1:29 因為你們蒙恩，不但得以信服基督，也要為他受苦；
1:30 你們所爭戰的，與你們在我身上從前所看見、現在所聽見的，都是一樣的。`,

  '7/28': `2:1 所以，在基督裡若有甚麼勸勉，愛心有甚麼安慰，聖靈有甚麼交通，心中有甚麼慈悲憐憫，
2:2 你們就要意念相同，愛心相同，有一樣的心思，有一樣的意念，使我的喜樂可以滿足。
2:3 凡事不可結黨，不可貪圖虛浮的榮耀；只要存心謙卑，各人看別人比自己強。
2:4 各人不要單顧自己的事，也要顧別人的事。
2:5 你們當以基督耶穌的心為心：
2:6 他本有神的形象，不以自己與神同等為強奪的；
2:7 反倒虛己，取了奴僕的形象，成為人的樣式；
2:8 既有人的樣子，就自己卑微，存心順服，以至於死，且死在十字架上。
2:9 所以，神將他升為至高，又賜給他那超乎萬名之上的名，
2:10 叫一切在天上的、地上的，和地底下的，因耶穌的名，無不屈膝，
2:11 無不口稱耶穌基督為主，使榮耀歸與父神。
2:12 這樣看來，我親愛的弟兄，你們既是常順從的，不但我在你們那裡，就是我如今不在你們那裡，更要恐懼戰兢，做成你們得救的工夫；
2:13 因為你們立志行事，都是神在你們心裡運行，為要成就他的美意。
2:14 凡所行的，都不要發怨言，起爭論，
2:15 使你們無可指摘，誠實無偽，在這彎曲悖謬的世代，作神無瑕疵的兒女，在世間好像明光照耀，
2:16 將生命的道表明出來，叫我在基督的日子好誇我沒有空跑，也沒有徒然勞力。
2:17 我以你們的信心為祭物，我若被澆奠在其上，也是喜樂，並且與你們眾人一同喜樂。
2:18 你們也要照樣喜樂，並且與我一同喜樂。
2:19 我靠主耶穌希望快打發提摩太去見你們，叫我知道你們的事，心裡就得著安慰。
2:20 因為我沒有別人與我同心，實在掛念你們的事；
2:21 別人都求自己的事，並不求耶穌基督的事。
2:22 但你們知道提摩太已經歷過試驗，他興旺福音與我同勞，待我如同兒子待父親一樣。
2:23 所以，我一看出我的事要怎樣了結，就盼望立刻打發他去；
2:24 但我靠主自信我也快去。
2:25 然而，我想必須打發以巴弗提到你們那裡去；他是我的兄弟，與我一同做工，一同當兵，也是你們所差來的，供給我需用的。
2:26 他很想念你們眾人，並且極其難過，因為你們聽見他病了。
2:27 他果然病了，幾乎要死；然而神憐憫他，不但憐憫他，也憐憫我，免得我憂上加憂。
2:28 所以我越發急速打發他去，叫你們再見了他，可以喜樂，我也可以少些憂愁。
2:29 故此，你們務要在主裡歡然接納他；且要尊重這樣的人。
2:30 因為他為做基督的工夫，幾乎至死，不顧性命，要補足你們供給我的不足。`,

  '7/29': `3:1 我弟兄們，我還有話說，你們要靠主喜樂。我把這話再寫給你們，於我並不為難，於你們也是妥當的。
3:2 應當防備犬類，防備作惡的，防備妄自行割的；
3:3 因為真受割禮的，乃是我們這以神的靈敬拜、在基督耶穌裡誇口、不靠著肉體的人。
3:4 其實，我也可以靠肉體；若別人想他可以靠肉體，我更可以靠著了。
3:5 我第八天受割禮，我是以色列族便雅憫支派的人，是希伯來人所生的希伯來人；就律法說，我是法利賽人；
3:6 就熱心說，我是逼迫教會的；就律法上的義說，我是無可指摘的。
3:7 只是我從前以為與我有益的，我現在因基督都當作有損的。
3:8 不但如此，我也將萬事當作有損的，因我以認識我主基督耶穌為至寶。我為他已經丟棄萬事，看作糞土，為要得著基督；
3:9 並且得在他裡面，不是有自己因律法而得的義，乃是有信基督的義，就是因信神而來的義；
3:10 使我認識基督，曉得他復活的大能，並且曉得和他一同受苦，效法他的死；
3:11 或者我也得以從死裡復活。
3:12 這不是說，我已經得著了，已經完全了；我乃是竭力追求，或者可以得著基督耶穌所以得著我的（原因）。
3:13 弟兄們，我不是以為自己已經得著了，我只有一件事，就是忘記背後，努力面前的，
3:14 向著標竿直跑，要得神在基督耶穌裡從上面召我來得的獎賞。
3:15 所以我們中間，凡是完全人，都要存這樣的心；若在甚麼事上，存別樣的心，神也必以此指示你們。
3:16 然而，我們到了甚麼地步，就當照著甚麼地步行。
3:17 弟兄們，你們要一同效法我，也當留意看那些照我們榜樣行事的人。
3:18 因為有許多人行事，是基督十字架的仇敵，我屢次告訴你們，現在又流淚地告訴你們。
3:19 他們的結局就是沉淪；他們的神就是自己的肚腹，他們以自己的羞辱為榮耀，專以地上的事為念。
3:20 我們卻是天上的公民，並且等候救主，就是主耶穌基督從天上降臨；
3:21 他要按著那能叫萬有歸服自己的大能，將我們這卑賤的身體改變形狀，和他自己榮耀的身體相似。`,

  '7/30': `4:1 我所親愛、所想念的弟兄們，你們就是我的喜樂，我的冠冕。我親愛的弟兄，你們應當靠主站立得穩，我就是這樣勸你們。
4:2 我勸友阿爹，也勸循都基，要在主裡意念相同。
4:3 我也求你這真實同負一軛的，幫助這兩個女人，因為她們在福音上曾與我一同勞苦，還有革利免並其餘和我一同做工的人；他們的名字都在生命冊上。
4:4 你們要靠主常常喜樂，我再說，你們要喜樂！
4:5 當叫眾人知道你們謙讓的心；主已經近了。
4:6 應當一無掛慮，只要凡事藉著禱告、祈求和感謝，將你們所要的告訴神。
4:7 神所賜出人意外的平安，必在基督耶穌裡，保守你們的心懷意念。
4:8 弟兄們，那些真實的、可敬的、公義的、清潔的、可愛的、有美名的事，若有甚麼德行，若有甚麼稱讚，這些事你們都要思念。
4:9 你們在我身上所學習的，所領受的，所聽見的，所看見的，這些事你們都要去行，賜平安的神就必與你們同在。
4:10 我靠主大大地歡樂，因為你們思念我的心如今又發生；你們向來就思念我，只是沒有機會。
4:11 我學會了，無論在甚麼狀態，可以知足，這是很要緊的。
4:12 我知道怎樣處卑賤，也知道怎樣處豐富，或飽足、或飢餓、或有餘、或缺乏，在各事上，並在一切事上，我都得了祕訣。
4:13 我靠著那加給我力量的，凡事都能做。
4:14 然而，你們和我同受患難，原是美事。
4:15 腓立比人哪，你們也知道，我初傳福音離了馬其頓的時候，論到授受的事，除了你們以外，並沒有別的教會供給我；
4:16 就是我在帖撒羅尼迦，你們也一次兩次地打發人供給我的需用。
4:17 我並不求甚麼饋送，所求的，就是你們的果子漸漸增多，歸在你們的賬上。
4:18 但我樣樣都有，並且有餘；我已經充足了，因我收了以巴弗提從你們那裡帶來的，當作極美的香氣，為神所收納、所喜悅的祭物。
4:19 我的神必照他榮耀的豐富，在基督耶穌裡，使你們一切所需用的都充足。
4:20 但願榮耀歸給我們的父神，直到永永遠遠。阿們！
4:21 請問在基督耶穌裡的各位聖徒。在我這裡的弟兄們問你們安。
4:22 眾聖徒問你們安，在凱撒家裡的人，格外問安。
4:23 願主耶穌基督的恩常在你們心裡！`,

  '7/31': `1 基督耶穌被囚的保羅，同兄弟提摩太，寫信給我們所親愛的同工腓利門，
2 並姐妹亞腓亞，並與我們同當兵的亞基布，以及在你家中的教會。
3 願恩惠、平安從父神並主耶穌基督歸與你們！
4 我在禱告中提到你的時候，常為你感謝我的神，
5 因聽說你有愛心，對主耶穌並對眾聖徒都有信心。
6 願你與人所同有的信心，因多知道你們所有的善事，就在基督裡顯出功效來。
7 弟兄啊，我們同有喜樂，同得安慰；因為你使眾聖徒的心，藉著你都暢快了，我也為此大有喜樂。
8 所以，我在基督裡雖然可以放膽，吩咐你所當做的事；
9 但我寧可用愛心求你；我這有年紀的保羅，現在又是為基督耶穌被囚的，
10 為我在捆鎖中所生的兒子阿尼西謀，求你，
11 他從前於你有用，但現在於你我都有用。
12 我現今把他親自，就是把我的心，打發到你那裡去了。
13 我本來有意留下他在我這裡，在我為福音所受的捆鎖中，他可以替你伺候我；
14 但不知道你的意思，我就不願意做，叫你的好處不是出於勉強，乃是出於甘心。
15 他暫時離開你，或者是叫你永遠得著他，
16 不再是奴僕，乃是高過奴僕，是親愛的兄弟；在我看他是如此，何況在你看，無論就著人情，還是就著主說，更是如此了。
17 你若以我為同伴，就收納他，如同收納我一樣。
18 他若虧負你，或欠你甚麼，都歸在我的賬上，
19 我保羅親筆寫說，我必償還；不用說，你就是你自己也是虧欠於我的。
20 是的，弟兄啊，願我在主裡因你得著益處，在基督裡使我的心暢快。
21 我寫信給你，我知道你必順從，我也知道你所做的，必超過我所說的。
22 此外，請你給我預備住處；因為我盼望，藉著你們的禱告，我必被賜給你們。
23 那與我一同在基督耶穌裡坐監的以巴弗拉問你安；
24 並我的同工馬可、亞里達古、底馬、路加，也都問你安。
25 願我們主耶穌基督的恩常在你們心裡。阿們！`,

  '6/29': `48:1 各支派按名所得之地記在下面：從北端，靠著哈特隆路，通到哈末口，從大馬色北界哈薩以難地，北邊靠著哈末，從東到西，是但的一分。
48:2 在但的境界旁邊，從東到西，是亞設的一分。
48:3 在亞設的境界旁邊，從東到西，是拿弗他利的一分。
48:4 在拿弗他利的境界旁邊，從東到西，是瑪拿西的一分。
48:5 在瑪拿西的境界旁邊，從東到西，是以法蓮的一分。
48:6 在以法蓮的境界旁邊，從東到西，是流便的一分。
48:7 在流便的境界旁邊，從東到西，是猶大的一分。
48:8 在猶大的境界旁邊，從東到西，是你們所當奉獻的地，寬二萬五千肘，長與各支派的分一樣，從東到西，其中的聖所在其正中。
48:9 你們所當奉獻的地，長二萬五千肘，寬一萬肘。
48:10 這所奉獻的聖地，祭司要得北邊長二萬五千肘，西邊寬一萬肘，東邊寬一萬肘，南邊長二萬五千肘，耶和華的聖所在其正中。
48:11 這地要歸撒督子孫中分別為聖的祭司，這些人在以色列人走迷的時候，不像利未人那樣走迷，乃是忠心守我所吩咐的。
48:12 所奉獻的地業，要從地業中歸他們，是至聖的，在利未人的地業旁邊。
48:13 在祭司地旁邊，利未人要得的地，長二萬五千肘，寬一萬肘；全長共二萬五千肘，寬一萬肘。
48:14 他們不可賣地業，不可交換，土地的初熟之物也不可歸別人，因為這是耶和華的聖地。
48:15 這二萬五千肘旁邊所剩的五千肘，不是聖地，是歸城的，可以居住，可以作郊野；城要在其中。
48:16 城的尺寸是這樣：北邊四千五百肘，南邊四千五百肘，東邊四千五百肘，西邊四千五百肘。
48:17 城的郊野，北邊二百五十肘，南邊二百五十肘，東邊二百五十肘，西邊二百五十肘。
48:18 所奉獻的聖地旁邊，往東剩下的長一萬肘，往西剩下的長一萬肘，這是在所奉獻的聖地旁邊剩下的；其中所出的要作城中服役之人的食物。
48:19 以色列各支派中，在城裡服役的人，要耕種這地。
48:20 所當奉獻的地，共長二萬五千肘，寬二萬五千肘，是四方的；你們要把這聖地並城的地業一同奉獻。

48:32 東邊量四千五百肘，也有三門：一是約瑟門，一是便雅憫門，一是但門。
