let currentSection = 'july'; // 'june' or 'july'
let currentIndex = 0;
let currentTab = 'scripture';

function getTodayInfo() {
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth() + 1, d = now.getDate();
  // Before June 23, 2026 → nothing unlocked
  if (y < 2026 || (y === 2026 && m < 6) || (y === 2026 && m === 6 && d < 23)) {
    return { section: 'july', index: -2 };
  }
  // June 23–29, 2026
  if (y === 2026 && m === 6) {
    return { section: 'june', index: Math.min(d - 23, 6) };
  }
  // After July 2026 → all unlocked
  if (y > 2026 || (y === 2026 && m > 7)) {
    return { section: 'july', index: 30 };
  }
  // During July 2026
  return { section: 'july', index: d - 1 };
}

const todayInfo = getTodayInfo();

function isAvailable(section, i) {
  if (todayInfo.index === -2) return false;
  if (section === 'june') {
    if (todayInfo.section === 'july') return true; // all June unlocked once July starts
    return i <= todayInfo.index;
  }
  // July
  if (todayInfo.section === 'june') return false; // July not started yet
  return i <= todayInfo.index;
}

function currentReading() {
  return currentSection === 'june' ? JUNE_READINGS[currentIndex] : READINGS[currentIndex];
}

function isTodaySelected() {
  return currentSection === todayInfo.section && currentIndex === todayInfo.index;
}

function render() {
  const r = currentReading();
  const available = isAvailable(currentSection, currentIndex);
  const isToday = isTodaySelected();

  // Header progress (count available days used so far)
  let completed = 0;
  if (todayInfo.index !== -2) {
    if (todayInfo.section === 'june') completed = todayInfo.index + 1;
    else completed = 7 + todayInfo.index + 1; // all 7 June + July days
  }
  document.getElementById('hdr-done').textContent = completed;
  const total = 38; // 7 June + 31 July
  const pct = Math.round(completed / total * 100);
  const circumference = 2 * Math.PI * 15.9;
  document.getElementById('progress-ring').setAttribute('stroke-dasharray', `${circumference * pct / 100} ${circumference}`);

  // Card re-animate
  const card = document.getElementById('main-card');
  card.classList.remove('fade-in'); void card.offsetWidth; card.classList.add('fade-in');

  // Header series title
  document.getElementById('hdr-title').textContent = currentSection === 'june'
    ? '靈魂的室內設計師' : '31天與保羅一起解鎖生命新視角';

  // Book tag & badges
  document.getElementById('book-tag').textContent = r.book;
  document.getElementById('today-badge').classList.toggle('hidden', !isToday);
  document.getElementById('locked-badge').classList.toggle('hidden', available);
  document.getElementById('day-meta').textContent = `第 ${r.day} 天 · 2026 年 ${r.date}`;
  document.getElementById('passage').textContent = r.passage;
  document.getElementById('day-num').textContent = r.day;
  document.getElementById('focus').textContent = available ? r.focus : '這天的內容將在當天解鎖';

  // Show/hide content vs locked
  document.getElementById('tabs-row').classList.toggle('hidden', !available);
  document.getElementById('panel-scripture').classList.toggle('hidden', !available || currentTab !== 'scripture');
  document.getElementById('panel-content').classList.toggle('hidden', !available || currentTab !== 'content');
  document.getElementById('panel-prayer').classList.toggle('hidden', !available || currentTab !== 'prayer');
  document.getElementById('locked-panel').classList.toggle('hidden', available);

  if (available) {
    const scriptureBody = document.getElementById('scripture-body');
    const scriptureText = SCRIPTURE[r.date] || '';
    if (scriptureText) {
      scriptureBody.innerHTML = scriptureText.split('\n').map(line => {
        const m = line.match(/^(\d+:\d+)\s+([\s\S]+)/);
        if (m) return `<p style="margin-bottom:10px"><span class="scripture-verse-num">${m[1]}</span>${m[2]}</p>`;
        return line ? `<p style="margin-bottom:10px">${line}</p>` : '';
      }).join('');
    } else {
      scriptureBody.innerHTML = '<span style="color:rgba(255,255,255,.3)">（經文準備中）</span>';
    }
    document.getElementById('navigation').textContent = r.navigation;
    document.getElementById('practice-god').textContent = r.practiceGod;
    // Show people practice block only if it has content (July entries)
    const peopleDiv = document.getElementById('practice-people');
    const peopleBlock = peopleDiv.closest('.practice-people');
    if (r.practicePeople) {
      peopleDiv.textContent = r.practicePeople;
      peopleBlock.classList.remove('hidden');
    } else {
      peopleBlock.classList.add('hidden');
    }
    document.getElementById('prayer').textContent = r.prayer;
    document.getElementById('verse').textContent = r.verse;
    document.getElementById('tags').textContent = r.tags;
  }

  // Bottom nav: prev disabled when at very first June entry
  const atFirst = currentSection === 'june' && currentIndex === 0;
  document.getElementById('btn-prev').disabled = atFirst;

  // Next: disabled when no next available day
  let nextAvail = false;
  if (currentSection === 'june') {
    if (currentIndex < 6) nextAvail = isAvailable('june', currentIndex + 1);
    else nextAvail = isAvailable('july', 0); // crossing into July
  } else {
    if (currentIndex < 30) nextAvail = isAvailable('july', currentIndex + 1);
  }
  document.getElementById('btn-next').disabled = !nextAvail;

  // "回今天" button
  document.getElementById('btn-today').classList.toggle('hidden', todayInfo.index === -2 || isTodaySelected());

  // June grid
  const juneGrid = document.getElementById('june-grid');
  juneGrid.innerHTML = '';
  JUNE_READINGS.forEach((rd, i) => {
    const avail = isAvailable('june', i);
    const isT = todayInfo.section === 'june' && i === todayInfo.index;
    const isPast = todayInfo.section === 'june' ? i < todayInfo.index : avail;
    const sel = currentSection === 'june' && i === currentIndex;
    const btn = document.createElement('button');
    btn.className = `day-btn p-1 text-center text-xs font-bold ${sel ? 'selected' : isT ? 'today' : isPast ? 'past' : 'future'} ${!avail ? 'locked' : ''}`;
    btn.style.minHeight = '42px';
    btn.innerHTML = `<div style="font-size:9px;opacity:.6;margin-bottom:1px">${rd.date.replace('6/','')}</div><div style="font-size:12px">${rd.day}</div>${isPast && !sel ? '<div style="font-size:8px;color:#c9a84c;opacity:.7">✓</div>' : ''}`;
    if (avail) {
      btn.onclick = () => { currentSection = 'june'; currentIndex = i; currentTab = 'scripture'; render(); };
    } else {
      btn.title = '尚未解鎖';
    }
    juneGrid.appendChild(btn);
  });

  // July grid
  const grid = document.getElementById('date-grid');
  grid.innerHTML = '';
  READINGS.forEach((rd, i) => {
    const avail = isAvailable('july', i);
    const isT = todayInfo.section === 'july' && i === todayInfo.index;
    const isPast = todayInfo.section === 'july' && i < todayInfo.index;
    const sel = currentSection === 'july' && i === currentIndex;
    const btn = document.createElement('button');
    btn.className = `day-btn p-1 text-center text-xs font-bold ${sel ? 'selected' : isT ? 'today' : isPast ? 'past' : 'future'} ${!avail ? 'locked' : ''}`;
    btn.style.minHeight = '42px';
    btn.innerHTML = `<div style="font-size:9px;opacity:.6;margin-bottom:1px">${rd.date.replace('7/','')}</div><div style="font-size:12px">${rd.day}</div>${isPast && !sel ? '<div style="font-size:8px;color:#c9a84c;opacity:.7">✓</div>' : ''}`;
    if (avail) {
      btn.onclick = () => { currentSection = 'july'; currentIndex = i; currentTab = 'scripture'; render(); };
    } else {
      btn.title = '尚未解鎖';
    }
    grid.appendChild(btn);
  });

  switchTabUI(currentTab);
}

function switchTab(tab) {
  if (!isAvailable(currentSection, currentIndex)) return;
  currentTab = tab;
  document.getElementById('panel-scripture').classList.toggle('hidden', tab !== 'scripture');
  document.getElementById('panel-content').classList.toggle('hidden', tab !== 'content');
  document.getElementById('panel-prayer').classList.toggle('hidden', tab !== 'prayer');
  switchTabUI(tab);
}

function switchTabUI(tab) {
  ['scripture','content','prayer'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
  });
}

function navigate(dir) {
  if (dir === -1) {
    if (currentSection === 'june' && currentIndex === 0) return;
    if (currentSection === 'july' && currentIndex === 0) {
      // Go to last available June day
      const maxJune = todayInfo.section === 'june' ? todayInfo.index : 6;
      if (isAvailable('june', maxJune)) {
        currentSection = 'june'; currentIndex = maxJune;
        currentTab = 'scripture'; render(); window.scrollTo({top:0, behavior:'smooth'});
      }
      return;
    }
    const prev = currentIndex - 1;
    if (!isAvailable(currentSection, prev)) return;
    currentIndex = prev;
  } else {
    if (currentSection === 'june') {
      if (currentIndex < 6 && isAvailable('june', currentIndex + 1)) {
        currentIndex++;
      } else if (currentIndex === 6 && isAvailable('july', 0)) {
        currentSection = 'july'; currentIndex = 0;
      } else return;
    } else {
      const next = currentIndex + 1;
      if (next > 30 || !isAvailable('july', next)) return;
      currentIndex = next;
    }
  }
  currentTab = 'scripture';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goToday() {
  if (todayInfo.index === -2) return;
  currentSection = todayInfo.section;
  currentIndex = todayInfo.index;
  currentTab = 'scripture';
  render();
  window.scrollTo({ top:0, behavior:'smooth' });
}

// Font size slider
(function() {
  const slider = document.getElementById('fs-slider');
  const label = document.getElementById('fs-label');
  const saved = localStorage.getItem('bible-fs');
  if (saved) { slider.value = saved; document.documentElement.style.setProperty('--fs', saved + 'px'); label.textContent = saved; }
  slider.addEventListener('input', () => {
    const v = slider.value;
    document.documentElement.style.setProperty('--fs', v + 'px');
    label.textContent = v;
    localStorage.setItem('bible-fs', v);
  });
})();

// Init: start on today's reading
if (todayInfo.index === -2) {
  currentSection = 'june'; currentIndex = 0;
} else {
  currentSection = todayInfo.section;
  currentIndex = todayInfo.index;
}
render();
</script>
